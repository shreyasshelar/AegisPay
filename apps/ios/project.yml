name: AegisPay
options:
  bundleIdPrefix: io.aegispay
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  swiftVersion: "6.0"
  defaultConfig: Debug

packages:
  AppAuth-iOS:
    url: https://github.com/openid/AppAuth-iOS.git
    from: 1.7.5
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2
  stripe-ios-spm:
    url: https://github.com/stripe/stripe-ios-spm.git
    from: 23.31.0

targets:
  AegisPay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AegisPay
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.aegispay.app
        INFOPLIST_FILE: AegisPay/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: complete
        API_BASE_URL: "http://localhost:8080"
        WS_BASE_URL: "ws://localhost:8080"
        KEYCLOAK_ISSUER: "http://localhost:8180/realms/aegispay"
        OAUTH_CLIENT_ID: "aegispay-mobile"
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: AppAuth-iOS
        product: AppAuth
      - package: KeychainAccess
      - package: stripe-ios-spm
        product: StripePaymentSheet
    scheme:
      testTargets:
        - AegisPayTests
      gatherCoverageData: true

  AegisPayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AegisPayTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.aegispay.app.tests
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: AegisPay
