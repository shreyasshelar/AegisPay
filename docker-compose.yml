# AegisPay — Local Development Stack
# Runs all infrastructure dependencies for local development.
#
# Usage:
#   docker compose up -d          # start all infra
#   docker compose down -v        # stop + remove volumes
#   docker compose logs -f kafka  # tail a specific service
#
# After startup, run each Spring Boot service locally (mvn spring-boot:run)
# pointing at the ports below, or run the full backend with:
#   mvn -pl services/user-service spring-boot:run

version: "3.9"

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aegispay-postgres
    environment:
      POSTGRES_USER: aegispay
      POSTGRES_PASSWORD: aegispay_dev
      POSTGRES_DB: aegispay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/local/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegispay"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aegispay-redis
    command: redis-server --requirepass aegispay_dev --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "aegispay_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MongoDB 7 ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: aegispay-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: aegispay
      MONGO_INITDB_ROOT_PASSWORD: aegispay_dev
      MONGO_INITDB_DATABASE: aegispay
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Kafka (KRaft, single-node) ───────────────────────────────────────────────
  kafka:
    # Official Apache Kafka image (free) — replaces Bitnami which went commercial.
    # Env vars use KAFKA_ prefix directly (no KAFKA_CFG_ wrapper).
    image: apache/kafka:3.7.0
    container_name: aegispay-kafka
    environment:
      # KRaft mode — no ZooKeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Fixed cluster ID ensures volume data survives container restarts
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9094:9094"   # host access (EXTERNAL listener)
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Kafka UI (optional — remove if not needed) ───────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aegispay-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    restart: unless-stopped

  # ── Keycloak 24 (multi-IdP dev identity provider) ────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: aegispay-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: dev-mem
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./infra/local/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8180/realms/aegispay || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ── ClickHouse (OLAP analytics store) ────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.4-alpine
    container_name: aegispay-clickhouse
    environment:
      CLICKHOUSE_DB: aegispay_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""          # empty for local dev
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"    # HTTP interface (JDBC)
      - "9000:9000"    # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  # ── Apache Superset (analytics dashboard) ────────────────────────────────────
  superset-db:
    image: postgres:16-alpine
    container_name: aegispay-superset-db
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  superset:
    image: apache/superset:3.1.3
    container_name: aegispay-superset
    depends_on:
      clickhouse:
        condition: service_healthy
      superset-db:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: "aegispay-superset-dev-secret-change-in-prod"
      SUPERSET_LOAD_EXAMPLES: "no"
      DATABASE_DB: superset
      DATABASE_HOST: superset-db
      DATABASE_PASSWORD: superset
      DATABASE_USER: superset
      DATABASE_PORT: "5432"
      DATABASE_DIALECT: postgresql
    ports:
      - "8088:8088"
    volumes:
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset_home:/app/superset_home
    command: >
      bash -c "
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@aegispay.io --password admin 2>/dev/null || true &&
        superset db upgrade &&
        superset init &&
        gunicorn --bind 0.0.0.0:8088 --workers 4 --timeout 120 --limit-request-line 0 --limit-request-field_size 0 'superset.app:create_app()'
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  kafka_data:
  clickhouse_data:
  superset_home:
  superset_db_data:

networks:
  default:
    name: aegispay-local
