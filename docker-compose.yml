# AegisPay — Local Development Stack
# Runs all infrastructure dependencies for local development.
#
# Usage:
#   docker compose up -d          # start all infra
#   docker compose down -v        # stop + remove volumes
#   docker compose logs -f kafka  # tail a specific service
#
# After startup, run each Spring Boot service locally (mvn spring-boot:run)
# pointing at the ports below, or run the full backend with:
#   mvn -pl services/user-service spring-boot:run

version: "3.9"

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aegispay-postgres
    environment:
      POSTGRES_USER: aegispay
      POSTGRES_PASSWORD: aegispay_dev
      POSTGRES_DB: aegispay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/local/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegispay"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aegispay-redis
    command: redis-server --requirepass aegispay_dev --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "aegispay_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MongoDB 7 ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: aegispay-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: aegispay
      MONGO_INITDB_ROOT_PASSWORD: aegispay_dev
      MONGO_INITDB_DATABASE: aegispay
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Kafka (KRaft, single-node) ───────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: aegispay-kafka
    environment:
      # KRaft mode — no ZooKeeper
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9094:9094"   # host access (EXTERNAL listener)
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Kafka UI (optional — remove if not needed) ───────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aegispay-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    restart: unless-stopped

  # ── Keycloak 24 (multi-IdP dev identity provider) ────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: aegispay-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: dev-mem
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./infra/local/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8180/realms/aegispay || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  kafka_data:

networks:
  default:
    name: aegispay-local
