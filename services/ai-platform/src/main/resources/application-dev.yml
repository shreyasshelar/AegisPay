# ─────────────────────────────────────────────────────────────────────────────
# AI Platform — Dev Spring Profile (K8s + local)
#
# Activated when SPRING_PROFILES_ACTIVE=dev (set in Helm configmap).
# Uses OpenRouter (OpenAI-compatible) for all AI — avoids Anthropic direct
# API key costs on dev and fixes the streaming-mode auth header issue
# (Anthropic client sends x-api-key; OpenRouter requires Authorization: Bearer;
#  OpenAI adapter sends the correct header automatically).
#
# Get a free OpenRouter key at: https://openrouter.ai
# GCP SM secret: aegispay-ai-secret  key: openrouter-api-key
# Mounted as: OPENROUTER_API_KEY env var in the pod
# ─────────────────────────────────────────────────────────────────────────────

spring:
  ai:
    # ── Disable Anthropic (not used on dev — avoids x-api-key auth header mismatch) ──
    anthropic:
      api-key: "not-used-on-dev"

    # ── OpenRouter via OpenAI-compatible adapter ──────────────────────────────
    # OpenRouter sends Authorization: Bearer header which OpenRouter expects.
    # Spring AI 1.0 appends /chat/completions to base-url automatically.
    openai:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY}
      chat:
        options:
          model: anthropic/claude-sonnet-4-5
          max-tokens: 4096
          temperature: 0.1

      # Embeddings via OpenRouter (text-embedding-3-small is available)
      embedding:
        options:
          model: openai/text-embedding-3-small

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

# ── Dev AI model config ────────────────────────────────────────────────────────
aegispay:
  ai:
    provider: openrouter
    models:
      chat: "anthropic/claude-sonnet-4-5"
      vision: "anthropic/claude-sonnet-4-5"
      embedding: "openai/text-embedding-3-small"
    rag:
      top-k: 5
      similarity-threshold: 0.65
    agent:
      max-iterations: 10
    audit:
      enabled: true
    openrouter:
      site-url: "https://aegispay.shreyasshelar.uk"
      site-name: "AegisPay Dev"
