spring:
  application:
    name: ai-platform
  lifecycle:
    timeout-per-shutdown-phase: 30s
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:aegispay_ai}
    username: ${DB_USERNAME:aegispay}
    password: ${DB_PASSWORD:aegispay_dev}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-placeholder-local-dev}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096
          temperature: 0.1
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder-local-dev}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:8180/realms/aegispay/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8091}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: ${spring.application.name}

aegispay:
  ai:
    rag:
      top-k: 5
      similarity-threshold: 0.7
    audit:
      enabled: true
    agent:
      max-iterations: 10

resilience4j:
  circuitbreaker:
    instances:
      rag-pipeline:
        failure-rate-threshold: 50
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - java.lang.RuntimeException
          - java.util.concurrent.TimeoutException
      # KYC vision pipeline (OCR, quality, tampering, validation)
      kyc-ai:
        failure-rate-threshold: 50
        sliding-window-size: 5
        sliding-window-type: COUNT_BASED
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        minimum-number-of-calls: 3
        record-exceptions:
          - java.lang.RuntimeException
          - java.util.concurrent.TimeoutException
      # AI triage agent
      triage-agent:
        failure-rate-threshold: 50
        sliding-window-size: 5
        sliding-window-type: COUNT_BASED
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        minimum-number-of-calls: 3
        record-exceptions:
          - java.lang.RuntimeException
          - java.util.concurrent.TimeoutException
  retry:
    instances:
      rag-pipeline:
        max-attempts: 2
        # 30s: outlasts OpenRouter's Retry-After (typically 20-21s on free tier 429s).
        # Only 1 retry — if it fails twice the CB fallback fires rather than blocking longer.
        wait-duration: 30s
        enable-exponential-backoff: false
        retry-exceptions:
          - java.lang.RuntimeException
      # KYC vision calls — 2 attempts, fast backoff (vision API is slow; don't pile up)
      kyc-ai:
        max-attempts: 2
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 5s
        retry-exceptions:
          - java.lang.RuntimeException
      # Triage agent — 2 attempts with 1 s backoff
      triage-agent:
        max-attempts: 2
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 8s
        retry-exceptions:
          - java.lang.RuntimeException
  timelimiter:
    instances:
      rag-pipeline:
        timeout-duration: 30s
        cancel-running-future: true
      # Vision API calls take longer — 60 s cap
      kyc-ai:
        timeout-duration: 60s
        cancel-running-future: true
      # Triage agent with tool calls — 45 s cap
      triage-agent:
        timeout-duration: 45s
        cancel-running-future: true

logging:
  file:
    name: logs/ai-platform.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] [corrId=%X{correlationId}] - %msg%n"
  level:
    root: INFO
    com.aegispay: DEBUG
    org.springframework.ai: DEBUG
