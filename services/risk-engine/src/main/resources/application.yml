spring:
  application:
    name: risk-engine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:aegispay_risk}
    username: ${DB_USERNAME:aegispay}
    password: ${DB_PASSWORD:aegispay_dev}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:aegispay_dev}
      repositories:
        enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: risk-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8180/realms/aegispay}

server:
  port: ${SERVER_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: ${spring.application.name}

aegispay:
  risk:
    score-threshold-approve: 30
    score-threshold-reject: 70
    velocity:
      window-minutes: 5
      max-transactions: 10
    amount-threshold:
      unverified-kyc-limit: 10000
    blacklist:
      redis-key-prefix: "aegispay:blacklist:"
  ai-platform:
    base-url: ${AI_PLATFORM_URL:http://ai-platform:8088}
    connect-timeout-ms: 3000
    read-timeout-ms: 10000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] [corrId=%X{correlationId}] - %msg%n"
  level:
    root: INFO
    com.aegispay: DEBUG
