spring:
  application:
    name: notification-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://aegispay:aegispay_dev@localhost:27017/aegispay_notifications?authSource=admin}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:aegispay.dev@gmail.com}
    # SMTP_PASSWORD injected from Vault via ESO → K8s secret aegispay-smtp-secret
    password: ${SMTP_PASSWORD:}
    from: ${SMTP_FROM_ADDRESS:aegispay.dev@gmail.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8180/realms/aegispay}

server:
  port: ${SERVER_PORT:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    mail:
      enabled: false
  metrics:
    tags:
      service: ${spring.application.name}

aegispay:
  notification:
    websocket:
      endpoint: /ws
      allowed-origins: ${ALLOWED_ORIGINS:*}
    sms:
      fast2sms:
        api-key: ${FAST2SMS_API_KEY:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] [corrId=%X{correlationId}] - %msg%n"
  level:
    root: INFO
    com.aegispay: DEBUG
