spring:
  application:
    name: notification-service
  lifecycle:
    timeout-per-shutdown-phase: 30s

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://aegispay:aegispay_dev@localhost:27017/aegispay_notifications?authSource=admin}
      # Required for @Indexed(unique,sparse) on Notification.eventKey to take effect.
      # Safe for dev; in prod, create indexes manually via a migration before enabling.
      auto-index-creation: true

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: "false"
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:aegispay.dev@gmail.com}
    # SMTP_PASSWORD injected from Vault via ESO â†’ K8s secret aegispay-smtp-secret
    password: ${SMTP_PASSWORD:}
    from: ${SMTP_FROM_ADDRESS:aegispay.dev@gmail.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:8180/realms/aegispay/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8086}
  shutdown: graceful
  max-http-request-header-size: 32KB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    mail:
      enabled: false
  metrics:
    tags:
      service: ${spring.application.name}

aegispay:
  user-service:
    base-url: ${USER_SERVICE_URI:http://localhost:8081}
  notification:
    websocket:
      endpoint: /ws
      allowed-origins: ${ALLOWED_ORIGINS:*}
    sms:
      fast2sms:
        api-key: ${FAST2SMS_API_KEY:}
    slack:
      webhook-url: ${SLACK_WEBHOOK_URL:}

logging:
  file:
    name: logs/notification-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] [corrId=%X{correlationId}] - %msg%n"
  level:
    root: INFO
    com.aegispay: DEBUG
