spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s

  cloud:
    gateway:
      # Routes are configured programmatically in GatewayRoutingConfig
      routes: []
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      httpclient:
        connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:3000}
        # 120s covers LLM latency on AI routes (OpenRouter free tier: 30-90s).
        # Healthy microservice routes respond in <1s so this only affects truly hung requests.
        # Use explicit 's' suffix — bare integers are parsed as nanoseconds by Spring Duration.
        response-timeout: 120s
        pool:
          type: disabled

    # ── Spring Cloud CircuitBreaker (Resilience4j) ──────────────────────────────
    # THIS is the namespace the Gateway circuitBreaker() filter reads.
    # The native resilience4j.circuitbreaker.* namespace below is for @CircuitBreaker
    # annotations only — it does NOT affect gateway filters.
    circuitbreaker:
      resilience4j:
        instances:
          # Baseline: applied to any named CB that has no explicit override.
          # minimumNumberOfCalls MUST be <= slidingWindowSize; if omitted it
          # defaults to 100, which means the circuit never opens on low traffic.
          default:
            slidingWindowSize: 10
            minimumNumberOfCalls: 10
            failureRateThreshold: 50
            waitDurationInOpenState: 10s
            permittedNumberOfCallsInHalfOpenState: 5
            slowCallDurationThreshold: 10s
            slowCallRateThreshold: 80

          user-service:
            slidingWindowSize: 20
            minimumNumberOfCalls: 5
            failureRateThreshold: 60
            waitDurationInOpenState: 15s
            permittedNumberOfCallsInHalfOpenState: 5
            slowCallDurationThreshold: 8s
            slowCallRateThreshold: 80

          transaction-service:
            slidingWindowSize: 20
            minimumNumberOfCalls: 10
            failureRateThreshold: 60
            waitDurationInOpenState: 15s
            permittedNumberOfCallsInHalfOpenState: 5
            slowCallDurationThreshold: 10s
            slowCallRateThreshold: 80

          ledger-service:
            slidingWindowSize: 10
            minimumNumberOfCalls: 5
            failureRateThreshold: 50
            waitDurationInOpenState: 10s
            permittedNumberOfCallsInHalfOpenState: 3
            slowCallDurationThreshold: 5s
            slowCallRateThreshold: 80

          payment-orchestrator:
            slidingWindowSize: 10
            minimumNumberOfCalls: 5
            failureRateThreshold: 50
            waitDurationInOpenState: 20s
            permittedNumberOfCallsInHalfOpenState: 3
            slowCallDurationThreshold: 15s
            slowCallRateThreshold: 80

          risk-engine:
            slidingWindowSize: 10
            minimumNumberOfCalls: 5
            failureRateThreshold: 50
            waitDurationInOpenState: 10s
            permittedNumberOfCallsInHalfOpenState: 3
            slowCallDurationThreshold: 8s
            slowCallRateThreshold: 80

          notification-service:
            slidingWindowSize: 10
            minimumNumberOfCalls: 5
            failureRateThreshold: 60
            # Notifications are best-effort; recover faster
            waitDurationInOpenState: 8s
            permittedNumberOfCallsInHalfOpenState: 3
            slowCallDurationThreshold: 5s
            slowCallRateThreshold: 80

          # AI platform — loose thresholds because:
          #   1. LLM calls are inherently slow (OpenRouter free tier: 30-90s)
          #   2. AI platform has its own internal CB that returns 200 fallback on failure
          #      so 5xx from the AI platform is rare; only a hard crash opens this CB.
          #   slowCallRateThreshold: 100 → slow calls never count toward opening the CB.
          #   failureRateThreshold: 80 → needs 80% true errors (5xx/timeout) to open.
          #   waitDurationInOpenState: 10s → recover fast when the platform comes back.
          ai-platform:
            slidingWindowSize: 20
            minimumNumberOfCalls: 10
            failureRateThreshold: 80
            waitDurationInOpenState: 10s
            permittedNumberOfCallsInHalfOpenState: 3
            slowCallDurationThreshold: 90s
            slowCallRateThreshold: 100

  security:
    oauth2:
      resourceserver:
        jwt:
          # Multi-IdP: configured programmatically via JwtIssuerReactiveAuthenticationManagerResolver
          # This single issuer-uri is kept as a reference; actual resolution is done in SecurityConfig
          issuer-uri: ${OAUTH2_PRIMARY_ISSUER_URI:http://localhost:8180/realms/aegispay}

  data:
    redis:
      url: ${REDIS_URL:redis://default:aegispay_dev@localhost:6379}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      lettuce:
        shutdown-timeout: 200ms

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  # Netty / WebFlux — no servlet config needed

management:
  server:
    port: ${MANAGEMENT_PORT:8190}   # ③ actuator binds to a separate port not exposed by Ingress/LB
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: when_authorized
    gateway:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${APP_ENV:local}

logging:
  file:
    name: logs/api-gateway.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] [corrId=%X{correlationId}] - %msg%n"
  level:
    root: INFO
    com.aegispay: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN

# ─── AegisPay Gateway Configuration ──────────────────────────────────────────
aegispay:
  gateway:
    # Multi-IdP JWT issuers.  Add new IdPs here without code changes.
    oauth2-trusted-issuers:
      - ${OAUTH2_ISSUER_KEYCLOAK:http://localhost:8180/realms/aegispay}
      - ${OAUTH2_ISSUER_KEYCLOAK_LOCAL:http://localhost:8180/realms/aegispay}
      - ${OAUTH2_ISSUER_ENTRA:https://login.microsoftonline.com/common/v2.0}
      - ${OAUTH2_ISSUER_OKTA:https://dev-000000.okta.com/oauth2/default}

    # Downstream service URIs (override via ConfigMap in Kubernetes)
    services:
      user-service: ${USER_SERVICE_URI:http://user-service:8081}
      transaction-service: ${TRANSACTION_SERVICE_URI:http://transaction-service:8082}
      ledger-service: ${LEDGER_SERVICE_URI:http://ledger-service:8083}
      orchestrator-service: ${ORCHESTRATOR_SERVICE_URI:http://payment-orchestrator:8084}
      risk-engine: ${RISK_ENGINE_URI:http://risk-engine:8085}
      notification-service: ${NOTIFICATION_SERVICE_URI:http://notification-service:8086}
      ai-platform: ${AI_PLATFORM_URI:http://ai-platform:8088}

    # Fixed-window rate limiter
    rate-limiter:
      max-requests: ${RATE_LIMIT_MAX_REQUESTS:100}
      window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
      key-ttl-seconds: ${RATE_LIMIT_KEY_TTL_SECONDS:65}
      limit-header: X-RateLimit-Limit
      remaining-header: X-RateLimit-Remaining
      reset-header: X-RateLimit-Reset

    # CORS
    cors:
      allowed-origins:
        - ${CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
        - ${CORS_ALLOWED_ORIGIN_2:https://aegispay.shreyasshelar.uk}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - X-Correlation-ID
        - X-Idempotency-Key
        - traceparent
        - tracestate
      allow-credentials: true
      max-age: 3600
