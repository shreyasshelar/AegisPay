spring:
  application:
    name: transaction-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aegispay_transactions}
    username: ${DB_USERNAME:aegispay}
    password: ${DB_PASSWORD:aegispay_dev}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://aegispay:aegispay_dev@localhost:27017/aegispay_txn_views?authSource=admin}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:aegispay_dev}
      repositories:
        enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: transaction-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8180/realms/aegispay}

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: ${spring.application.name}

aegispay:
  outbox:
    batch-size: 100
    poll-interval-ms: 500
  idempotency:
    ttl-seconds: 86400

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] [corrId=%X{correlationId}] [userId=%X{userId}] - %msg%n"
  level:
    root: INFO
    com.aegispay: DEBUG
