spring:
  application:
    name: transaction-service
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:aegispay_transactions}
    username: ${DB_USERNAME:aegispay}
    password: ${DB_PASSWORD:aegispay_dev}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://aegispay:aegispay_dev@localhost:27017/aegispay_txn_views?authSource=admin}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:aegispay_dev}
      repositories:
        enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: transaction-service
      auto-offset-reset: earliest
      enable-auto-commit: "false"
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:8180/realms/aegispay/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: ${spring.application.name}

aegispay:
  outbox:
    batch-size: 100
    poll-interval-ms: 500
  idempotency:
    ttl-seconds: 86400
  user-service:
    base-url: ${USER_SERVICE_URL:http://user-service:8081}

resilience4j:
  circuitbreaker:
    instances:
      user-service-kyc:
        # After 5 failures in 10 calls, open circuit and use fallback (allow transaction through)
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2

logging:
  file:
    name: logs/transaction-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] [corrId=%X{correlationId}] [userId=%X{userId}] - %msg%n"
  level:
    root: INFO
    com.aegispay: DEBUG
