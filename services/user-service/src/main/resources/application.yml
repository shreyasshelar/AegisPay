spring:
  application:
    name: user-service
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:aegispay_users}
    username: ${DB_USERNAME:aegispay}
    password: ${DB_PASSWORD:aegispay_dev}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      idle-timeout: 600000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:aegispay_dev}
      repositories:
        enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:8180/realms/aegispay/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
  max-http-request-header-size: 32KB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: ${spring.application.name}

keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm:           ${KEYCLOAK_REALM:aegispay}
  admin:
    # Master-realm admin credentials used by KeycloakAdminService.fetchAdminToken().
    # A master-realm password grant is used instead of aegispay-realm client_credentials
    # because service-account tokens lack resource_access.realm-management roles in JWT
    # claims (Keycloak default) → admin REST API returns 403 even with manage-users role.
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:}

aegispay:
  outbox:
    batch-size: 100
    poll-interval-ms: 1000
  idempotency:
    ttl-seconds: 86400
  ai-platform:
    base-url: ${AI_PLATFORM_URL:http://ai-platform:8088}
  # Shared secret for authenticating internal service-to-service calls.
  # The AI Platform passes this in X-Internal-Api-Key after async KYC processing.
  # Set USER_SERVICE_INTERNAL_API_KEY in production (via ESO → GCP Secret Manager).
  internal-api-key: ${USER_SERVICE_INTERNAL_API_KEY:aegispay-internal-dev-key}
  sms:
    fast2sms:
      api-key: ${FAST2SMS_API_KEY:}

logging:
  file:
    name: logs/user-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] [corrId=%X{correlationId}] [userId=%X{userId}] - %msg%n"
  level:
    root: INFO
    com.aegispay: DEBUG
