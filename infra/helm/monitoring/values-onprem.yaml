# ─────────────────────────────────────────────────────────────────────────────
# kube-prometheus-stack — On-Prem / k3s values
#
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f infra/helm/monitoring/values-onprem.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Retain 15 days of metrics — keep disk usage manageable
    retention: 15d
    retentionSize: "8GB"

    # Scrape all pods with the standard Bitnami annotation
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Additional scrape configs for Spring Boot actuator endpoints
    # (services already have prometheus.io/scrape annotations via Helm templates)
    additionalScrapeConfigs:
      - job_name: aegispay-services
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [aegispay]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: service

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true

  adminPassword: ""   # pulled from K8s Secret grafana-admin-secret (set by Vault ESO)
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.aegispay.YOUR_DOMAIN.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.aegispay.YOUR_DOMAIN.com

  # Pre-load AegisPay dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true

  # Auto-configure Prometheus datasource
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-prometheus.monitoring.svc.cluster.local:9090
          isDefault: true
          access: proxy

  # Pre-built dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: aegispay
          orgId: 1
          folder: AegisPay
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/aegispay

  dashboards:
    aegispay:
      # Import from Grafana.com dashboard IDs
      spring-boot-statistics:
        gnetId: 17175   # Spring Boot Observability dashboard
        revision: 1
        datasource: Prometheus
      jvm-micrometer:
        gnetId: 4701    # JVM Micrometer dashboard
        revision: 13
        datasource: Prometheus
      kafka-overview:
        gnetId: 7589    # Kafka Overview
        revision: 5
        datasource: Prometheus

# ── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, service, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "null"
      routes:
        - matchers:
            - severity = critical
          receiver: critical-alerts
          continue: true
    receivers:
      - name: "null"
      # Add a real receiver here (email, Slack, PagerDuty) when needed
      - name: critical-alerts
        # Example: webhook to your own alerting endpoint
        webhook_configs: []

# ── Node Exporter — expose server hardware metrics ───────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics — expose K8s object state ────────────────────────────
kubeStateMetrics:
  enabled: true

# ── Reduce resource footprint of the stack itself ────────────────────────────
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
