# ─────────────────────────────────────────────────────────────────────────────
# kube-prometheus-stack — Dev/staging values (AWS, cost-optimised)
# ─────────────────────────────────────────────────────────────────────────────

prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: "20GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 30Gi

grafana:
  enabled: true
  adminUser: admin
  adminPassword: ${GRAFANA_ADMIN_PASSWORD:-changeme}
  persistence:
    enabled: true
    storageClassName: gp3
    size: 5Gi
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus:9090
          isDefault: true

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "aegispay.dev@gmail.com"
      smtp_auth_username: "aegispay.dev@gmail.com"
      smtp_auth_password_file: /etc/alertmanager/smtp-password
      smtp_require_tls: true
    route:
      group_by: [alertname, service, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 8h
      receiver: slack-dev
    receivers:
      - name: slack-dev
        slack_configs:
          - channel: "#aegispay-alerts"
            api_url_file: /etc/alertmanager/slack-webhook
            send_resolved: true
            title: "[DEV {{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: |-
              {{ range .Alerts }}
              Service: {{ .Labels.service | default "unknown" }} | {{ .Annotations.summary }}
              {{ end }}
  extraVolumes:
    - name: slack-webhook
      secret:
        secretName: aegispay-slack-secret
        items:
          - key: webhook-url
            path: slack-webhook
    - name: smtp-password
      secret:
        secretName: aegispay-smtp-secret
        items:
          - key: password
            path: smtp-password
  extraVolumeMounts:
    - name: slack-webhook
      mountPath: /etc/alertmanager/slack-webhook
      subPath: slack-webhook
      readOnly: true
    - name: smtp-password
      mountPath: /etc/alertmanager/smtp-password
      subPath: smtp-password
      readOnly: true
