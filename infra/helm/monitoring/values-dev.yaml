# ─────────────────────────────────────────────────────────────────────────────
# kube-prometheus-stack — Dev / k3s values
#
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f infra/helm/monitoring/values-dev.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Retain 15 days of metrics — keep disk usage manageable
    retention: 15d
    retentionSize: "8GB"

    # Scrape all pods with the standard Bitnami annotation
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Additional scrape configs for Spring Boot actuator endpoints
    # (services already have prometheus.io/scrape annotations via Helm templates)
    additionalScrapeConfigs:
      - job_name: aegispay-services
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [aegispay]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: service

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true

  adminPassword: ""   # pulled from K8s Secret grafana-admin-secret (set by Vault ESO)
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  plugins:
    - grafana-clickhouse-datasource

  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - aegispay-metrics.shreyasshelar.uk
    tls:
      - secretName: grafana-tls
        hosts:
          - aegispay-metrics.shreyasshelar.uk

  # Pre-load AegisPay dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true

  # Auto-configure datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-prometheus.monitoring.svc.cluster.local:9090
          isDefault: true
          access: proxy
        # AegisPay ClickHouse — analytics dashboards (payment ops, fraud, SLA)
        - name: ClickHouse
          type: grafana-clickhouse-datasource
          uid: aegispay-clickhouse
          isDefault: false
          jsonData:
            host: clickhouse.aegispay-infra.svc.cluster.local
            port: 9000
            username: default
            defaultDatabase: aegispay_analytics
            protocol: native
            secure: false
          secureJsonData:
            password: ${CLICKHOUSE_PASSWORD}
          editable: false

  # Pre-built dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: aegispay
          orgId: 1
          folder: AegisPay
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/aegispay

  dashboards:
    aegispay:
      # Import from Grafana.com dashboard IDs
      spring-boot-statistics:
        gnetId: 17175   # Spring Boot Observability dashboard
        revision: 1
        datasource: Prometheus
      jvm-micrometer:
        gnetId: 4701    # JVM Micrometer dashboard
        revision: 13
        datasource: Prometheus
      kafka-overview:
        gnetId: 7589    # Kafka Overview
        revision: 5
        datasource: Prometheus

# ── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "aegispay.dev@gmail.com"
      smtp_auth_username: "aegispay.dev@gmail.com"
      smtp_auth_password_file: /etc/alertmanager/smtp-password
      smtp_require_tls: true
    route:
      group_by: [alertname, service, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-aegispay
      routes:
        - matchers:
            - severity = critical
          receiver: critical-multi
        - matchers:
            - severity = warning
          receiver: slack-aegispay
    receivers:
      - name: slack-aegispay
        slack_configs:
          - channel: "#aegispay-alerts"
            api_url_file: /etc/alertmanager/slack-webhook
            send_resolved: true
            title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: |-
              {{ range .Alerts }}
              *Service:* {{ .Labels.service | default "unknown" }} | *Severity:* {{ .Labels.severity }}
              {{ .Annotations.summary }}
              {{ end }}
      - name: critical-multi
        slack_configs:
          - channel: "#aegispay-alerts"
            api_url_file: /etc/alertmanager/slack-webhook
            send_resolved: true
            title: "🔴 CRITICAL: {{ .CommonLabels.alertname }}"
            color: danger
        email_configs:
          - to: "aegispay.dev@gmail.com"
            send_resolved: true
            headers:
              Subject: "🔴 [AegisPay CRITICAL] {{ .CommonLabels.alertname }}"

  extraVolumes:
    - name: slack-webhook
      secret:
        secretName: aegispay-slack-secret
        items:
          - key: webhook-url
            path: slack-webhook
    - name: smtp-password
      secret:
        secretName: aegispay-smtp-secret
        items:
          - key: password
            path: smtp-password

  extraVolumeMounts:
    - name: slack-webhook
      mountPath: /etc/alertmanager/slack-webhook
      subPath: slack-webhook
      readOnly: true
    - name: smtp-password
      mountPath: /etc/alertmanager/smtp-password
      subPath: smtp-password
      readOnly: true

# ── Node Exporter — expose server hardware metrics ───────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics — expose K8s object state ────────────────────────────
kubeStateMetrics:
  enabled: true

# ── Reduce resource footprint of the stack itself ────────────────────────────
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
