apiVersion: v2
name: aegispay-infra
description: >
  Umbrella Helm chart for all AegisPay backing services.
  Used on dev k3s environments (dev branch).
  AWS-managed equivalents (RDS, MSK, ElastiCache, DocumentDB) are used in prod.
type: application
version: 0.1.0
appVersion: "1.0.0"

# All Bitnami chart dependencies have been replaced with custom templates
# using official Docker Hub images (postgres:16-alpine, redis:7.4-alpine,
# mongo:7.0, quay.io/keycloak/keycloak:24.0).
#
# Reason: Bitnami removed all specific-version image tags from docker.io/bitnami/
# and GHCR (ghcr.io/bitnami/) requires a paid Broadcom/VMware Tanzu account
# even for anonymous pulls. Official Docker Hub images are free with no auth.
#
# Custom templates live in:
#   templates/postgresql/   templates/mongodb/
#   templates/redis/        templates/keycloak/
#   templates/kafka/        (existing)
