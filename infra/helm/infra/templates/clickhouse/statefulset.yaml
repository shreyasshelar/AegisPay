{{- if .Values.clickhouse.enabled }}
{{- /*
  ClickHouse Server — 2 shards × 2 replicas
  One StatefulSet per shard; each StatefulSet has 2 replicas.
  Pod ordinal inside the StatefulSet = replica index (0 or 1).
  Macros are injected via init container so config.xml can stay generic.
*/ -}}
{{- range $shardIdx := until 2 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-shard-{{ $shardIdx }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: clickhouse
    shard: "{{ $shardIdx }}"
spec:
  serviceName: clickhouse-shard-{{ $shardIdx }}-headless
  replicas: 2          # 2 replicas per shard
  selector:
    matchLabels:
      app: clickhouse
      shard: "{{ $shardIdx }}"
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: clickhouse
        shard: "{{ $shardIdx }}"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8123"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 60

      initContainers:
        # Write shard/replica macros so the generic config.xml can reference them
        - name: macros-gen
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              ORDINAL="${HOSTNAME##*-}"
              SHARD_NUM=$(printf '%02d' $(( {{ $shardIdx }} + 1 )))
              REPLICA_NUM=$(printf '%02d' $(( ORDINAL + 1 )))
              REPLICA_FQDN="${HOSTNAME}.clickhouse-shard-{{ $shardIdx }}-headless.{{ $.Values.namespace }}.svc.cluster.local"
              mkdir -p /etc/clickhouse-server/conf.d
              cat > /etc/clickhouse-server/conf.d/macros.xml <<EOF
              <clickhouse>
                <macros>
                  <shard>${SHARD_NUM}</shard>
                  <replica>${REPLICA_FQDN}</replica>
                  <cluster>aegispay_cluster</cluster>
                </macros>
              </clickhouse>
              EOF
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: conf-d
              mountPath: /etc/clickhouse-server/conf.d

      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:{{ $.Values.clickhouse.serverVersion | default "24.3" }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
            - name: interserver
              containerPort: 9009
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.clickhouse.existingSecret | default "clickhouse-secret" }}
                  key: password
          volumeMounts:
            - name: conf-d
              mountPath: /etc/clickhouse-server/conf.d
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.xml
              subPath: config.xml
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/users.xml
              subPath: users.xml
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
          resources:
            requests:
              cpu:    {{ $.Values.clickhouse.server.resources.requests.cpu    | default "200m" }}
              memory: {{ $.Values.clickhouse.server.resources.requests.memory | default "512Mi" }}
            limits:
              cpu:    {{ $.Values.clickhouse.server.resources.limits.cpu    | default "2000m" }}
              memory: {{ $.Values.clickhouse.server.resources.limits.memory | default "4Gi" }}
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /replicas_status
              port: 8123
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3

      affinity:
        podAntiAffinity:
          # Hard: don't co-locate two replicas of the same shard on the same node
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: clickhouse
                  shard: "{{ $shardIdx }}"
              topologyKey: kubernetes.io/hostname
          # Soft: spread shards across nodes if possible
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: clickhouse
                topologyKey: kubernetes.io/hostname

      volumes:
        - name: conf-d
          emptyDir: {}
        - name: clickhouse-config
          configMap:
            name: clickhouse-config

  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ $.Values.clickhouse.storageClass | default "local-path" }}
        resources:
          requests:
            storage: {{ $.Values.clickhouse.server.storage | default "50Gi" }}
---
# Headless service for inter-shard replication and pod DNS
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-shard-{{ $shardIdx }}-headless
  namespace: {{ $.Values.namespace }}
  labels:
    app: clickhouse
    shard: "{{ $shardIdx }}"
spec:
  clusterIP: None
  selector:
    app: clickhouse
    shard: "{{ $shardIdx }}"
  ports:
    - name: http
      port: 8123
    - name: native
      port: 9000
    - name: interserver
      port: 9009
{{- end }}
---
# Single ClusterIP service for application access (load-balanced across all shards)
# Services use the native port; Distributed tables handle shard routing.
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: {{ $.Values.namespace }}
  labels:
    app: clickhouse
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clickhouse
  namespace: {{ $.Values.namespace }}
  labels:
    app: clickhouse
spec:
  selector:
    matchLabels:
      app: clickhouse
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
# PodDisruptionBudget — each shard must always have ≥1 replica available
{{- range $shardIdx := until 2 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: clickhouse-shard-{{ $shardIdx }}-pdb
  namespace: {{ $.Values.namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: clickhouse
      shard: "{{ $shardIdx }}"
{{- end }}
{{- end }}
