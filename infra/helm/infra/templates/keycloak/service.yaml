{{- if .Values.keycloak.enabled }}
# ── Keycloak Primary Service ───────────────────────────────────────────────────
# Named <release>-keycloak, port 80 → container 8080.
# Used internally by keycloak-configure-job and other services.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-keycloak
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: keycloak
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: keycloak
---
# ── Keycloak Alias Service (port 8080) ────────────────────────────────────────
# Named "keycloak" so Cloudflare tunnel can reach it at:
#   keycloak.{{ .Values.global.namespace | default .Release.Namespace }}.svc.cluster.local:8080
# Also used by Spring Boot services via global.oauth2.issuerUri (port 8080).
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: keycloak
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app: keycloak
{{- end }}
