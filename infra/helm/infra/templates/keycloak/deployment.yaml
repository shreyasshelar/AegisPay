{{- if .Values.keycloak.enabled }}
# ── Keycloak Deployment ───────────────────────────────────────────────────────
# Uses official quay.io/keycloak/keycloak:24.0 (no auth required).
# Bitnami keycloak chart was removed — its images require GHCR auth (Broadcom paywall).
#
# Runs in start-dev mode (no HTTPS enforced) — TLS is terminated at Cloudflare.
# Realm imported from keycloak-realm-config ConfigMap on first start.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: keycloak
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        # Wait for PostgreSQL before starting Keycloak
        - name: wait-for-postgres
          image: "busybox:1.36"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.keycloak.externalDatabase.host }} {{ .Values.keycloak.externalDatabase.port | default 5432 }}; do
                echo "Waiting for PostgreSQL at {{ .Values.keycloak.externalDatabase.host }}:{{ .Values.keycloak.externalDatabase.port | default 5432 }}..."
                sleep 3
              done
              echo "PostgreSQL is ready."
      containers:
        - name: keycloak
          image: "quay.io/keycloak/keycloak:24.0"
          imagePullPolicy: IfNotPresent
          args:
            - "start-dev"
            - "--import-realm"
          # KC_IMPORT_STRATEGY=IGNORE_EXISTING prevents realm re-import from
          # overwriting UI changes made after first start (fixes P1-5).
          # The realm ConfigMap is still mounted so cold-start imports work.
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.auth.adminUser | default "admin" | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.auth.existingSecret }}
                  key: {{ .Values.keycloak.auth.existingSecretPasswordKey | default "admin-password" }}
            # Database connection
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ .Values.keycloak.externalDatabase.host }}:{{ .Values.keycloak.externalDatabase.port | default 5432 }}/{{ .Values.keycloak.externalDatabase.database }}"
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.externalDatabase.user | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.externalDatabase.existingSecret }}
                  key: {{ .Values.keycloak.externalDatabase.existingSecretPasswordKey | default "password" }}
            # HTTP settings — Cloudflare terminates TLS
            # Idempotent re-import: existing realm/clients are NOT overwritten
            # on restart. New objects in the ConfigMap are still imported.
            - name: KC_IMPORT_STRATEGY
              value: "IGNORE_EXISTING"
            - name: KC_HTTP_ENABLED
              value: "true"
            # KC_HOSTNAME fixes the iss claim and all generated redirect URIs to the
            # public URL — critical for browser OAuth flows via Cloudflare tunnel.
            # Without this Keycloak uses the incoming request hostname, which is the
            # internal cluster DNS when accessed from within K8s → browser can't resolve.
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.hostname | default "aegispay-keycloak.shreyasshelar.uk" | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              # Must be "true" — without this Keycloak generates http:// in the
              # discovery doc issuer field.  openid-client re-fetches the issuer
              # URL for validation; if the issuer is http:// but KEYCLOAK_ISSUER
              # is https:// the mismatch triggers a re-discover via https:// which
              # then hits the http.Agent restriction → ERR_INVALID_PROTOCOL.
              value: "true"
            - name: KC_PROXY
              value: "edge"
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
{{- end }}
