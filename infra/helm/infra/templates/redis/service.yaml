{{- if .Values.redis.enabled }}
# ── Redis Services ────────────────────────────────────────────────────────────
# App services connect via redis-master.aegispay-infra.svc.cluster.local:6379
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app: redis
{{- end }}
