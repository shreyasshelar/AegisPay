{{- if .Values.kafka.enabled }}
# ── Kafka StatefulSet ────────────────────────────────────────────────────────
# Uses the official Apache Kafka image (free, ASF-maintained).
# Bitnami Kafka chart was removed because it pulled a commercial Docker image.
# KRaft mode — no ZooKeeper required.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: kafka-headless
  replicas: 1   # single-node for dev — scale up only with MSK in prod
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        app.kubernetes.io/name: kafka
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: kafka
          image: "apache/kafka:{{ .Values.kafka.image.tag | default "3.7.0" }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: client
              containerPort: 9092
              protocol: TCP
            - name: controller
              containerPort: 9093
              protocol: TCP
          env:
            # ── KRaft identity ──────────────────────────────────────────────
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: CLUSTER_ID
              value: {{ .Values.kafka.clusterId | default "MkU3OEVBNTcwNTJENDM2Qk" | quote }}

            # ── Listeners ───────────────────────────────────────────────────
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.{{ .Values.global.namespace | default .Release.Namespace }}.svc.cluster.local:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-headless:9093"

            # ── Topic defaults (safe for single-node dev) ───────────────────
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_NUM_PARTITIONS
              value: {{ .Values.kafka.numPartitions | default 3 | quote }}
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: {{ .Values.kafka.logRetentionHours | default 168 | quote }}

            # ── JVM ─────────────────────────────────────────────────────────
            - name: KAFKA_HEAP_OPTS
              value: {{ .Values.kafka.heapOpts | default "-Xmx512m -Xms256m" | quote }}

          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}

          readinessProbe:
            exec:
              command:
                - /opt/kafka/bin/kafka-topics.sh
                - --bootstrap-server
                - localhost:9092
                - --list
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - /opt/kafka/bin/kafka-topics.sh
                - --bootstrap-server
                - localhost:9092
                - --list
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data

  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.kafka.persistence.storageClass | default "local-path" }}
        resources:
          requests:
            storage: {{ .Values.kafka.persistence.size | default "15Gi" }}
{{- end }}
