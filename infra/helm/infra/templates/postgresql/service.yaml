{{- if .Values.postgresql.enabled }}
# ── PostgreSQL Services ───────────────────────────────────────────────────────
# ClusterIP service — app services connect via postgresql.aegispay-infra.svc.cluster.local:5432
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: postgresql
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: tcp-postgresql
      protocol: TCP
  selector:
    app: postgresql
---
# Headless service — required for StatefulSet DNS and Keycloak lookup validation
apiVersion: v1
kind: Service
metadata:
  name: postgresql-headless
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: postgresql
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: tcp-postgresql
      protocol: TCP
  selector:
    app: postgresql
{{- end }}
