{{- if .Values.keycloak.secretRotation.enabled }}
---
# ── Keycloak Client Secret Rotation Job ────────────────────────────────────────
# Runs on a schedule via CronJob. Rotates the Keycloak `aegispay-backend` client
# secret AND writes the new value back to GCP Secret Manager so ESO picks it up.
#
# Write-back mechanism:
#   Uses the GCE instance metadata server (http://169.254.169.254/...) to obtain
#   an access token for the VM's attached service account — no gcloud CLI or
#   key file required. Works on any pod running on a GCE VM.
#
# ⚠️  ONE-TIME GCP IAM SETUP (run once, not in Helm):
#   VM_SA=$(gcloud compute instances describe aegispay-k3s \
#     --zone=us-central1-a --project={{ .Values.keycloak.gcpProject }} \
#     --format="value(serviceAccounts[0].email)")
#
#   # Grant write access to EACH secret this job needs to rotate:
#   gcloud secrets add-iam-policy-binding {{ .Values.keycloak.gcpClientSecretName }} \
#     --member="serviceAccount:${VM_SA}" \
#     --role="roles/secretmanager.secretVersionManager" \
#     --project={{ .Values.keycloak.gcpProject }}
#
# Managed secrets updated by this job:
#   GCP SM: {{ .Values.keycloak.gcpClientSecretName }}  → synced to K8s by ESO
#   Keycloak: client {{ .Values.keycloak.clientId | default "aegispay-backend" }} secret regenerated
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-secret-rotation
  namespace: {{ .Values.namespace | default "aegispay" }}
  labels:
    app.kubernetes.io/name: keycloak-secret-rotation
    app.kubernetes.io/part-of: aegispay
    app.kubernetes.io/component: security
spec:
  # Rotate every 30 days at 03:00 UTC — adjust to your security policy
  schedule: "0 3 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: keycloak-secret-rotation
            app.kubernetes.io/part-of: aegispay
        spec:
          restartPolicy: OnFailure
          serviceAccountName: keycloak-rotation-sa

          containers:
            - name: rotation
              image: curlimages/curl:8.9.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail

                  KEYCLOAK_URL="{{ .Values.keycloak.adminUrl }}"
                  CLIENT_ID="{{ .Values.keycloak.clientId | default "aegispay-backend" }}"
                  REALM="{{ .Values.keycloak.realm | default "aegispay" }}"
                  GCP_PROJECT="{{ .Values.keycloak.gcpProject }}"
                  GCP_SECRET="{{ .Values.keycloak.gcpClientSecretName }}"

                  # ── Step 1: Authenticate to Keycloak Admin API ────────────────
                  echo "[rotation] Authenticating to Keycloak Admin API..."
                  TOKEN_RESP=$(curl -sf \
                    -d "client_id=admin-cli" \
                    -d "username={{ .Values.keycloak.adminUsername | default "admin" }}" \
                    -d "password=${KEYCLOAK_ADMIN_PASSWORD}" \
                    -d "grant_type=password" \
                    "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token")

                  ADMIN_TOKEN=$(echo "$TOKEN_RESP" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
                  if [ -z "$ADMIN_TOKEN" ]; then
                    echo "[rotation] ERROR: Failed to obtain admin token from Keycloak"
                    exit 1
                  fi
                  echo "[rotation] Admin token obtained"

                  # ── Step 2: Resolve internal client UUID ──────────────────────
                  CLIENT_UUID=$(curl -sf \
                    -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                    "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=${CLIENT_ID}" \
                    | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
                  if [ -z "$CLIENT_UUID" ]; then
                    echo "[rotation] ERROR: Client '${CLIENT_ID}' not found in realm '${REALM}'"
                    exit 1
                  fi
                  echo "[rotation] Client UUID: ${CLIENT_UUID}"

                  # ── Step 3: Regenerate the Keycloak client secret ────────────
                  NEW_SECRET=$(curl -sf -X POST \
                    -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                    "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${CLIENT_UUID}/client-secret" \
                    | grep -o '"value":"[^"]*"' | cut -d'"' -f4)
                  if [ -z "$NEW_SECRET" ]; then
                    echo "[rotation] ERROR: Failed to regenerate client secret"
                    exit 1
                  fi
                  echo "[rotation] New Keycloak client secret generated (first 4 chars: ${NEW_SECRET:0:4}...)"

                  # ── Step 4: Write new secret to GCP Secret Manager ───────────
                  # Obtain access token from GCE instance metadata server.
                  # This works on any GCE VM without gcloud CLI or key files —
                  # the VM's attached service account must have
                  # roles/secretmanager.secretVersionManager on ${GCP_SECRET}.
                  echo "[rotation] Obtaining GCE metadata token..."
                  GCP_TOKEN=$(curl -sf \
                    -H "Metadata-Flavor: Google" \
                    "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
                    | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

                  if [ -z "$GCP_TOKEN" ]; then
                    echo "[rotation] ERROR: Failed to obtain GCE metadata token."
                    echo "[rotation] Check: VM's service account has secretmanager.secretVersionManager on ${GCP_SECRET}."
                    exit 1
                  fi
                  echo "[rotation] GCE metadata token obtained"

                  # base64-encode the secret value (RFC 4648, no line breaks)
                  SECRET_B64=$(printf '%s' "${NEW_SECRET}" | base64 | tr -d '\n')

                  # Add new version to GCP Secret Manager
                  SM_RESP=$(curl -sf -X POST \
                    -H "Authorization: Bearer ${GCP_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"payload\":{\"data\":\"${SECRET_B64}\"}}" \
                    "https://secretmanager.googleapis.com/v1/projects/${GCP_PROJECT}/secrets/${GCP_SECRET}:addSecretVersion")

                  NEW_VERSION=$(echo "$SM_RESP" | grep -o '"name":"[^"]*"' | cut -d'"' -f4)
                  if [ -z "$NEW_VERSION" ]; then
                    echo "[rotation] ERROR: GCP SM addSecretVersion failed. Response: ${SM_RESP}"
                    exit 1
                  fi
                  echo "[rotation] ✅ GCP SM new version created: ${NEW_VERSION}"
                  echo "[rotation] ESO will sync the new secret to K8s within 1h (ExternalSecret refreshInterval)."
                  echo "[rotation] Rotation complete."

              env:
                - name: KEYCLOAK_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: aegispay-keycloak-secret
                      key: password

              resources:
                requests:
                  cpu:    "50m"
                  memory: "32Mi"
                limits:
                  cpu:    "200m"
                  memory: "64Mi"

---
# Service account — no K8s RBAC needed (GCE metadata server handles GCP auth)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-rotation-sa
  namespace: {{ .Values.namespace | default "aegispay" }}
  labels:
    app.kubernetes.io/name: keycloak-secret-rotation
    app.kubernetes.io/part-of: aegispay
# automountServiceAccountToken: false — keep default (true) so the pod can talk
# to the K8s API if ever needed; the actual GCP auth goes via GCE metadata server.
{{- end }}
