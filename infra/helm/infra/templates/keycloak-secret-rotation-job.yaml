{{- if .Values.keycloak.secretRotation.enabled }}
---
# ── Keycloak Client Secret Rotation Job ────────────────────────────────────────
# Runs on a schedule via CronJob. Rotates the Keycloak `aegispay-backend` client
# secret and writes the new value to Vault so all services pick it up.
#
# Steps performed by the rotation script:
#   1. Authenticate to Keycloak Admin API using current admin credentials from Vault.
#   2. Generate a new client secret via POST .../regenerate-secret.
#   3. Write the new secret to Vault at secret/aegispay/keycloak/client-secret.
#   4. Optionally trigger an ArgoCD sync / rolling restart of affected services.
#
# Managed secrets (read from Vault at runtime):
#   - KEYCLOAK_ADMIN_PASSWORD  — Admin account password.
#   - VAULT_TOKEN              — AppRole token with write access to the secret path.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-secret-rotation
  namespace: {{ .Values.namespace | default "aegispay" }}
  labels:
    app.kubernetes.io/name: keycloak-secret-rotation
    app.kubernetes.io/part-of: aegispay
    app.kubernetes.io/component: security
spec:
  # Rotate every 30 days at 03:00 UTC — adjust to your security policy
  schedule: "0 3 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      # Retry once on failure; alert after the second attempt fails
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: keycloak-secret-rotation
            app.kubernetes.io/part-of: aegispay
        spec:
          restartPolicy: OnFailure
          serviceAccountName: keycloak-rotation-sa

          # Vault Agent Injector annotations — injects secrets as env vars at pod start
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "keycloak-rotation"
            vault.hashicorp.com/agent-inject-secret-admin: "secret/aegispay/keycloak/admin"
            vault.hashicorp.com/agent-inject-template-admin: |
              {{`{{- with secret "secret/aegispay/keycloak/admin" -}}
              export KEYCLOAK_ADMIN_PASSWORD="{{ .Data.data.password }}"
              {{- end }}`}}
            vault.hashicorp.com/agent-inject-secret-vault-token: "secret/aegispay/vault/rotation-token"
            vault.hashicorp.com/agent-inject-template-vault-token: |
              {{`{{- with secret "secret/aegispay/vault/rotation-token" -}}
              export VAULT_TOKEN="{{ .Data.data.token }}"
              {{- end }}`}}

          containers:
            - name: rotation
              image: curlimages/curl:8.9.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail

                  # Source Vault-injected secrets
                  . /vault/secrets/admin
                  . /vault/secrets/vault-token

                  KEYCLOAK_URL="{{ .Values.keycloak.adminUrl }}"
                  CLIENT_ID="{{ .Values.keycloak.clientId | default "aegispay-backend" }}"
                  REALM="{{ .Values.keycloak.realm | default "aegispay" }}"
                  VAULT_ADDR="{{ .Values.vault.addr }}"
                  SECRET_PATH="secret/data/aegispay/keycloak/client-secret"

                  echo "[rotation] Authenticating to Keycloak Admin API..."
                  TOKEN_RESP=$(curl -sf \
                    -d "client_id=admin-cli" \
                    -d "username={{ .Values.keycloak.adminUsername | default "admin" }}" \
                    -d "password=${KEYCLOAK_ADMIN_PASSWORD}" \
                    -d "grant_type=password" \
                    "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token")

                  ADMIN_TOKEN=$(echo "$TOKEN_RESP" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
                  if [ -z "$ADMIN_TOKEN" ]; then
                    echo "[rotation] ERROR: Failed to obtain admin token from Keycloak"
                    exit 1
                  fi
                  echo "[rotation] Admin token obtained"

                  # Resolve internal client UUID from client_id
                  CLIENT_UUID=$(curl -sf \
                    -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                    "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=${CLIENT_ID}" \
                    | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
                  if [ -z "$CLIENT_UUID" ]; then
                    echo "[rotation] ERROR: Client '${CLIENT_ID}' not found in realm '${REALM}'"
                    exit 1
                  fi
                  echo "[rotation] Client UUID: ${CLIENT_UUID}"

                  # Regenerate the client secret
                  NEW_SECRET=$(curl -sf -X POST \
                    -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                    "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${CLIENT_UUID}/client-secret" \
                    | grep -o '"value":"[^"]*"' | cut -d'"' -f4)
                  if [ -z "$NEW_SECRET" ]; then
                    echo "[rotation] ERROR: Failed to regenerate client secret"
                    exit 1
                  fi
                  echo "[rotation] New client secret generated (first 4 chars: ${NEW_SECRET:0:4}...)"

                  # Write new secret to Vault
                  VAULT_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                    -H "X-Vault-Token: ${VAULT_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -X POST \
                    -d "{\"data\":{\"value\":\"${NEW_SECRET}\"}}" \
                    "${VAULT_ADDR}/v1/${SECRET_PATH}")

                  if [ "$VAULT_STATUS" != "200" ] && [ "$VAULT_STATUS" != "204" ]; then
                    echo "[rotation] ERROR: Vault write failed with HTTP ${VAULT_STATUS}"
                    exit 1
                  fi
                  echo "[rotation] New secret written to Vault at ${SECRET_PATH}"
                  echo "[rotation] Rotation complete — services will reload on next pod restart / ExternalSecret sync"

              env:
                - name: KEYCLOAK_URL
                  value: "{{ .Values.keycloak.adminUrl }}"
                - name: VAULT_ADDR
                  value: "{{ .Values.vault.addr }}"

              resources:
                requests:
                  cpu:    "50m"
                  memory: "32Mi"
                limits:
                  cpu:    "200m"
                  memory: "64Mi"

---
# Service account with minimal RBAC — no cluster-wide permissions needed
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-rotation-sa
  namespace: {{ .Values.namespace | default "aegispay" }}
  labels:
    app.kubernetes.io/name: keycloak-secret-rotation
    app.kubernetes.io/part-of: aegispay
  annotations:
    # Vault AppRole annotation — the Vault operator grants write access to the rotation secret path
    vault.hashicorp.com/role: "keycloak-rotation"
{{- end }}
