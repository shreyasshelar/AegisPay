# ─────────────────────────────────────────────────────────────────────────────
# AegisPay Infra — Dev / k3s values
#
# All backing services use official Docker Hub images (no auth required).
# Bitnami charts were removed — their images require a paid Broadcom/GHCR account.
# Custom templates live in templates/{postgresql,mongodb,redis,kafka,keycloak}/
# ─────────────────────────────────────────────────────────────────────────────

global:
  namespace: "aegispay-infra"

# ── PostgreSQL ────────────────────────────────────────────────────────────────
# Image: postgres:16-alpine (official Docker Hub)
postgresql:
  enabled: true

  auth:
    username: aegispay
    existingSecret: aegispay-db-secret
    secretKeys:
      userPasswordKey: password
    database: aegispay   # default DB; per-service DBs created by init script

  primary:
    persistence:
      storageClass: local-path
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ── MongoDB ───────────────────────────────────────────────────────────────────
# Image: mongo:7.0 (official Docker Hub)
# MONGO_INITDB_ROOT_USERNAME is set to auth.username so the app connection string
# mongodb://aegispay:pass@mongodb:27017/aegispay?authSource=admin works directly.
mongodb:
  enabled: true

  auth:
    username: aegispay
    existingSecret: aegispay-mongo-secret
    database: aegispay

  persistence:
    storageClass: local-path
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Redis ─────────────────────────────────────────────────────────────────────
# Image: redis:7.4-alpine (official Docker Hub)
redis:
  enabled: true

  auth:
    existingSecret: aegispay-redis-secret
    existingSecretPasswordKey: password

  master:
    persistence:
      storageClass: local-path
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# ── Kafka ─────────────────────────────────────────────────────────────────────
# Uses custom templates (templates/kafka/) with apache/kafka:3.7.0 (free, ASF).
kafka:
  enabled: true

  image:
    tag: "3.7.0"

  clusterId: "MkU3OEVBNTcwNTJENDM2Qk"

  numPartitions: 3
  logRetentionHours: 168

  persistence:
    storageClass: local-path
    size: 15Gi

  heapOpts: "-Xmx512m -Xms256m"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ── Keycloak ──────────────────────────────────────────────────────────────────
# Image: quay.io/keycloak/keycloak:24.0 (official Keycloak, no auth required)
# Runs start-dev mode — TLS terminated at Cloudflare.
keycloak:
  enabled: true

  auth:
    adminUser: admin
    existingSecret: aegispay-keycloak-secret
    existingSecretPasswordKey: password   # ESO stores keycloak secret under key "password"

  externalDatabase:
    host: postgresql
    port: 5432
    user: aegispay
    database: aegispay_keycloak
    existingSecret: aegispay-db-secret
    existingSecretPasswordKey: password

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Secret rotation CronJob configuration
  secretRotation:
    enabled: true
  adminUrl: "http://aegispay-infra-keycloak:80"
  adminUsername: "admin"
  clientId: "aegispay-backend"
  realm: "aegispay"

# ── Vault (addr used by secret-rotation CronJob) ──────────────────────────────
vault:
  addr: "http://vault:8200"

# ── ClickHouse ────────────────────────────────────────────────────────────────
clickhouse:
  enabled: false


# ── Kafka-UI ──────────────────────────────────────────────────────────────────
kafkaUi:
  enabled: true
  bootstrapServers: "kafka.aegispay-infra.svc.cluster.local:9092"
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi
