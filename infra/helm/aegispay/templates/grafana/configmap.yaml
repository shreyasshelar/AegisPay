{{- if .Values.grafana.enabled }}
# ── Grafana provisioning — datasource (ClickHouse) ────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  clickhouse.yaml: |
    apiVersion: 1
    datasources:
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        uid: aegispay-clickhouse
        isDefault: true
        jsonData:
          host: {{ .Values.grafana.clickhouseDatasource.host | quote }}
          port: {{ .Values.grafana.clickhouseDatasource.port | default 9000 }}
          username: {{ .Values.grafana.clickhouseDatasource.username | default "default" | quote }}
          defaultDatabase: {{ .Values.grafana.clickhouseDatasource.database | default "aegispay_analytics" | quote }}
          protocol: native
          secure: false
          dialTimeout: 10
          queryTimeout: 60
        secureJsonData:
          password: ${CLICKHOUSE_PASSWORD}
        editable: true
---
# ── Grafana provisioning — dashboard provider ─────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  aegispay.yaml: |
    apiVersion: 1
    providers:
      - name: AegisPay
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
# ── Grafana dashboards ────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    # Label for Grafana sidecar pattern (on-prem / kube-prometheus-stack)
    grafana_dashboard: "1"
binaryData:
  transaction-ops.json: {{ .Files.Get "files/dashboards/transaction-ops.json" | b64enc | quote }}
  fraud-intelligence.json: {{ .Files.Get "files/dashboards/fraud-intelligence.json" | b64enc | quote }}
  sla-latency.json: {{ .Files.Get "files/dashboards/sla-latency.json" | b64enc | quote }}
{{- end }}
