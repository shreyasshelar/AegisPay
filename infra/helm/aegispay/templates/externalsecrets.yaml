metadata:
  name: aegispay-stripe-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  refreshInterval: 24h
  {{- include "aegispay.secretStoreRef" . | nindent 2 }}
  target:
    name: aegispay-stripe-secret
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      {{- if .Values.secrets.useGcpSm }}
      remoteRef:
        key: {{ .Values.secrets.stripe.secretName | quote }}
      {{- else }}
      remoteRef:
        key: {{ .Values.secrets.stripe.secretPath | quote }}
        property: secret_key
      {{- end }}
    {{- if not .Values.secrets.useGcpSm }}
    - secretKey: webhook-secret
      remoteRef:
        key: {{ .Values.secrets.stripe.secretPath | quote }}
        property: webhook_secret
    {{- end }}
---
{{- if .Values.secrets.useGcpSm }}
