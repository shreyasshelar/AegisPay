{{/*
ExternalSecret resources map secrets from the configured secret store
(HashiCorp Vault or AWS Secrets Manager) into Kubernetes Secrets.
The secret store backend is configured in values-{env}.yaml.
*/}}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aegispay-secret-store
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  provider:
    {{- if .Values.secrets.useVault }}
    vault:
      server: {{ .Values.secrets.vault.address | quote }}
      path: {{ .Values.secrets.vault.path | quote }}
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: {{ .Values.secrets.vault.role | quote }}
    {{- else }}
    aws:
      service: SecretsManager
      region: {{ .Values.secrets.aws.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: aegispay-eso
    {{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aegispay-db-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aegispay-secret-store
    kind: SecretStore
  target:
    name: aegispay-db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.db.secretPath | quote }}
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aegispay-redis-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aegispay-secret-store
    kind: SecretStore
  target:
    name: aegispay-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.redis.secretPath | quote }}
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aegispay-ai-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: aegispay-secret-store
    kind: SecretStore
  target:
    name: aegispay-ai-secret
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: {{ .Values.secrets.ai.secretPath | quote }}
        property: anthropic_api_key
    - secretKey: openai-api-key
      remoteRef:
        key: {{ .Values.secrets.ai.secretPath | quote }}
        property: openai_api_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aegispay-kafka-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aegispay-secret-store
    kind: SecretStore
  target:
    name: aegispay-kafka-secret
    creationPolicy: Owner
  data:
    - secretKey: sasl-username
      remoteRef:
        key: {{ .Values.secrets.kafka.secretPath | quote }}
        property: sasl_username
    - secretKey: sasl-password
      remoteRef:
        key: {{ .Values.secrets.kafka.secretPath | quote }}
        property: sasl_password
