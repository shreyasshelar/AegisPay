{{/*
ExternalSecret resources — map GCP Secret Manager secrets into K8s Secrets via ESO.

Active backend (dev/GCP):
  secrets.useGcpSm: true → GCP Secret Manager (ClusterSecretStore: gcp-secret-store)
  Created by: setup-cluster-gcp.sh / infra/argocd/app-gcp.yaml

Future prod backends (not yet active):
  secrets.useVault: true → HashiCorp Vault   (namespace SecretStore — see values-prod.yaml)
  neither                → AWS Secrets Manager (namespace SecretStore — see values.yaml)
*/}}
{{- if not .Values.secrets.useGcpSm }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aegispay-secret-store
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  provider:
    {{- if .Values.secrets.useVault }}
    vault:
      server: {{ .Values.secrets.vault.address | quote }}
      path: {{ .Values.secrets.vault.path | quote }}
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: {{ .Values.secrets.vault.role | quote }}
    {{- else }}
    aws:
      service: SecretsManager
      region: {{ .Values.secrets.aws.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: aegispay-eso
    {{- end }}
{{- end }}
---

{{/* Helper: SecretStore ref — ClusterSecretStore for GCP SM, SecretStore for Vault/AWS */}}
{{- define "aegispay.secretStoreRef" -}}
{{- if .Values.secrets.useGcpSm }}
secretStoreRef:
  name: gcp-secret-store
  kind: ClusterSecretStore
{{- else }}
secretStoreRef:
  name: aegispay-secret-store
  kind: SecretStore
{{- end }}
{{- end }}

{{/* Helper: remoteRef — includes ESO default fields so rendered spec matches live spec.
     Without these ArgoCD sees constant diff on conversionStrategy/decodingStrategy etc. */}}
{{- define "aegispay.remoteRef" -}}
{{- $path := index . 0 -}}
{{- $property := index . 1 -}}
{{- $secretName := index . 2 -}}
{{- $useGcpSm := index . 3 -}}
{{- if $useGcpSm }}
remoteRef:
  key: {{ $secretName | quote }}
  conversionStrategy: Default
  decodingStrategy: None
  metadataPolicy: None
  nullBytePolicy: Ignore
{{- else }}
remoteRef:
  key: {{ $path | quote }}
  property: {{ $property }}
  conversionStrategy: Default
  decodingStrategy: None
  metadataPolicy: None
  nullBytePolicy: Ignore
{{- end }}
{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aegispay-db-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  {{- include "aegispay.secretStoreRef" . | nindent 2 }}
  target:
    name: aegispay-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: password
      {{- if .Values.secrets.useGcpSm }}
      remoteRef:
        key: {{ .Values.secrets.db.secretName | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
      {{- else }}
      remoteRef:
        key: {{ .Values.secrets.db.secretPath | quote }}
        property: password
      {{- end }}
---
