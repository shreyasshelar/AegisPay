{{/*
ExternalSecret resources map secrets from the configured secret store into K8s Secrets.
Backend selected by values-{env}.yaml:
  secrets.useVault: true  → HashiCorp Vault (namespace-scoped SecretStore)
  secrets.useGcpSm: true  → GCP Secret Manager (ClusterSecretStore created by setup-cluster-gcp.sh)
  neither               → AWS Secrets Manager (namespace-scoped SecretStore)
*/}}
{{- if not .Values.secrets.useGcpSm }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aegispay-secret-store
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  provider:
    {{- if .Values.secrets.useVault }}
    vault:
      server: {{ .Values.secrets.vault.address | quote }}
      path: {{ .Values.secrets.vault.path | quote }}
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: {{ .Values.secrets.vault.role | quote }}
    {{- else }}
    aws:
      service: SecretsManager
      region: {{ .Values.secrets.aws.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: aegispay-eso
    {{- end }}
{{- end }}
---

{{/* Helper: SecretStore ref — ClusterSecretStore for GCP SM, SecretStore for Vault/AWS */}}
{{- define "aegispay.secretStoreRef" -}}
{{- if .Values.secrets.useGcpSm }}
secretStoreRef:
  name: gcp-secret-store
  kind: ClusterSecretStore
{{- else }}
secretStoreRef:
  name: aegispay-secret-store
  kind: SecretStore
{{- end }}
{{- end }}

{{/* Helper: remoteRef for a secret that is a single value (GCP SM) or a property in a map (Vault/AWS) */}}
{{- define "aegispay.remoteRef" -}}
{{- $path := index . 0 -}}
{{- $property := index . 1 -}}
{{- $secretName := index . 2 -}}
{{- $useGcpSm := index . 3 -}}
{{- if $useGcpSm }}
remoteRef:
  key: {{ $secretName | quote }}
{{- else }}
remoteRef:
  key: {{ $path | quote }}
  property: {{ $property }}
{{- end }}
{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aegispay-db-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  {{- include "aegispay.secretStoreRef" . | nindent 2 }}
  target:
    name: aegispay-db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      {{- if .Values.secrets.useGcpSm }}
      remoteRef:
        key: {{ .Values.secrets.db.secretName | quote }}
      {{- else }}
      remoteRef:
        key: {{ .Values.secrets.db.secretPath | quote }}
        property: password
      {{- end }}
---
