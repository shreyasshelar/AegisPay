{{- if .Values.services.user_service.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: user-service
data:
  DB_HOST: {{ include "aegispay.pgHost" . | quote }}
  DB_PORT: {{ .Values.global.postgresql.port | quote }}
  DB_USERNAME: {{ .Values.global.postgresql.username | quote }}
  DB_NAME: "aegispay_users"
  KAFKA_BOOTSTRAP_SERVERS: {{ include "aegispay.kafkaBroker" . | quote }}
  REDIS_HOST: {{ include "aegispay.redisHost" . | quote }}
  REDIS_PORT: {{ .Values.global.redis.port | quote }}
  OAUTH2_JWK_SET_URI: {{ include "aegispay.jwkSetUri" . | quote }}
  SERVER_PORT: "8081"
  # Keycloak admin URL — used by KeycloakAdminService.writeUserAttributes() to
  # write aegispay_user_id + aegispay_tenant_id back to Keycloak after registration.
  # Without this, social-login users never get aegispay_user_id in their JWT and
  # every /users/me call falls back to the external_id bootstrap path indefinitely.
  # Uses the internal cluster URL to avoid hairpin routing through Cloudflare.
  KEYCLOAK_URL: {{ include "aegispay.keycloakInternalBaseUrl" . | quote }}
  KEYCLOAK_REALM: "aegispay"
  # Master-realm admin username for KeycloakAdminService.fetchAdminToken().
  # The password is injected via extraEnv from aegispay-keycloak-admin-secret (ESO).
  KEYCLOAK_ADMIN_USERNAME: "admin"
{{- end }}