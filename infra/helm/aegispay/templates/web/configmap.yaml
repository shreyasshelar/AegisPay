{{- if .Values.services.web.enabled }}
# Web configmap — trigger deployment rollout via checksum annotation when config changes
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: web
data:
  NEXT_PUBLIC_API_BASE_URL: {{ .Values.services.web.env.apiBaseUrl | default "https://aegispay-api.shreyasshelar.uk" | quote }}
  NEXT_PUBLIC_WS_BASE_URL: {{ .Values.services.web.env.wsBaseUrl | default "wss://aegispay-ws.shreyasshelar.uk" | quote }}
  NEXTAUTH_URL: {{ .Values.services.web.env.nextauthUrl | default "https://aegispay.shreyasshelar.uk" | quote }}
  KEYCLOAK_ID: {{ .Values.services.web.env.keycloakClientId | default "aegispay-web" | quote }}
  # Public URL — used for JWT `iss` validation and browser authorization redirect
  KEYCLOAK_ISSUER: {{ .Values.global.oauth2.issuerUri | quote }}
  # Internal cluster URL — used for server-side OIDC discovery + token exchange.
  # Avoids hairpin routing through Cloudflare on every NextAuth server-side call.
  # Keycloak returns public hostname in discovery responses (KC_HOSTNAME), so the
  # openid-client issuer check still passes against KEYCLOAK_ISSUER above.
  # Derived from global.infraNamespace via _helpers.tpl; override with explicit value if needed.
  KEYCLOAK_INTERNAL_URL: {{ include "aegispay.keycloakInternalUrl" . | quote }}
{{- end }}
