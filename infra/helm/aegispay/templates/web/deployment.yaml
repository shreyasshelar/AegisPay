{{- if .Values.services.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: web
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.services.web.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "aegispay.selectorLabels" (dict "name" "web" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aegispay.selectorLabels" (dict "name" "web" "context" .) | nindent 8 }}
        app.kubernetes.io/part-of: aegispay
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/web/configmap.yaml") . | sha256sum }}
        # deploy/timestamp changes on every web image push so ArgoCD detects a
        # pod-spec diff and rolls the pod even when the image tag is reused
        # (e.g. "dev-latest").  Updated by cd-dev.yml via yq on values-dev.yaml.
        deploy/timestamp: {{ .Values.services.web.deployTimestamp | default "initial" | quote }}
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: web
          image: "{{ .Values.global.imageRepositoryPrefix }}/web:{{ .Values.services.web.image.tag | default "dev-latest" }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Next.js runtime config
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # Public env vars (baked at build, also available at runtime)
            - name: NEXT_PUBLIC_API_BASE_URL
              value: {{ .Values.services.web.env.apiBaseUrl | default "https://aegispay-api.shreyasshelar.uk" | quote }}
            - name: NEXT_PUBLIC_WS_BASE_URL
              value: {{ .Values.services.web.env.wsBaseUrl | default "wss://aegispay-ws.shreyasshelar.uk" | quote }}
            # NextAuth
            - name: NEXTAUTH_URL
              value: {{ .Values.services.web.env.nextauthUrl | default "https://aegispay.shreyasshelar.uk" | quote }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: aegispay-web-secret
                  key: nextauth-secret
            # Keycloak OAuth2 provider
            - name: KEYCLOAK_ID
              value: {{ .Values.services.web.env.keycloakClientId | default "aegispay-web" | quote }}
            - name: KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: aegispay-web-secret
                  key: keycloak-client-secret
            - name: KEYCLOAK_ISSUER
              value: {{ .Values.global.oauth2.issuerUri | quote }}
            # Internal Keycloak URL — server-side OIDC discovery + token exchange stay
            # in-cluster, avoiding Cloudflare hairpin on every NextAuth server-side call.
            # Derived from global.infraNamespace via _helpers.tpl.
            - name: KEYCLOAK_INTERNAL_URL
              value: {{ include "aegispay.keycloakInternalUrl" . | quote }}
            # Internal API URL (server-side only — goes directly to api-gateway, not via Cloudflare)
            - name: API_BASE_URL
              value: "http://api-gateway.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.services.api_gateway.port | default 8080 }}"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.web.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
{{- end }}
