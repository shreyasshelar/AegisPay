{{- if .Values.services.transaction_service.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: transaction-service-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: transaction-service
data:
  DB_HOST: {{ include "aegispay.pgHost" . | quote }}
  DB_PORT: {{ .Values.global.postgresql.port | quote }}
  DB_USERNAME: {{ .Values.global.postgresql.username | quote }}
  DB_NAME: "aegispay_transactions"
  KAFKA_BOOTSTRAP_SERVERS: {{ include "aegispay.kafkaBroker" . | quote }}
  REDIS_HOST: {{ include "aegispay.redisHost" . | quote }}
  REDIS_PORT: {{ .Values.global.redis.port | quote }}
  MONGODB_URI: {{ include "aegispay.mongoUri" . | quote }}
  OAUTH2_JWK_SET_URI: {{ include "aegispay.jwkSetUri" . | quote }}
  SERVER_PORT: "8082"
  # Explicit FQDN — prevents short-name DNS lookup failures if the service runs
  # in a namespace different from the default search domain.
  # resolveUserId() falls back to http://user-service:8081 without this, which works
  # within the same namespace but is fragile across multi-namespace topologies.
  USER_SERVICE_URL: {{ printf "http://user-service.%s.svc.cluster.local:8081" .Values.global.namespace | quote }}
{{- end }}
