{{- if .Values.services.ai_platform.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-platform-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: ai-platform
data:
  DB_HOST: {{ include "aegispay.pgHost" . | quote }}
  DB_PORT: {{ .Values.global.postgresql.port | quote }}
  DB_USERNAME: {{ .Values.global.postgresql.username | quote }}
  DB_NAME: "aegispay_ai"
  KAFKA_BOOTSTRAP_SERVERS: {{ include "aegispay.kafkaBroker" . | quote }}
  REDIS_HOST: {{ include "aegispay.redisHost" . | quote }}
  REDIS_PORT: {{ .Values.global.redis.port | quote }}
  MONGODB_URI: {{ include "aegispay.mongoUri" . | quote }}
  OAUTH2_JWK_SET_URI: {{ include "aegispay.jwkSetUri" . | quote }}
  SERVER_PORT: "8088"

  # Activate dev Spring profile:
  #   - OpenRouter via OpenAI-compatible adapter (Authorization: Bearer header)
  #   - Fixes streaming-mode auth error that happens with Anthropic client + OpenRouter
  SPRING_PROFILES_ACTIVE: "dev"

  # K8s namespace — injected into tools so they can call K8s API and service DNS
  K8S_NAMESPACE: {{ .Values.global.namespace | quote }}
  INFRA_NAMESPACE: {{ .Values.global.infraNamespace | quote }}

  # GitHub repo for DeploymentHistoryTool (git not available in container)
  GITHUB_REPO: "shreyasshelar/AegisPay"

  # SPRING_APPLICATION_JSON: runtime overrides (no rebuild needed).
  # Only sets triage project root — all AI model config is in application-dev.yml.
  SPRING_APPLICATION_JSON: >-
    {
      "aegispay": {
        "ai": {
          "triage": {
            "project-root": "/app",
            "k8s-mode": true
          }
        }
      }
    }
{{- end }}
