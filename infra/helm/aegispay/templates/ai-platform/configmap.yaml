{{- if .Values.services.ai_platform.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-platform-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: ai-platform
data:
  DB_HOST: {{ include "aegispay.pgHost" . | quote }}
  DB_PORT: {{ .Values.global.postgresql.port | quote }}
  DB_USERNAME: {{ .Values.global.postgresql.username | quote }}
  DB_NAME: "aegispay_ai"
  KAFKA_BOOTSTRAP_SERVERS: {{ include "aegispay.kafkaBroker" . | quote }}
  REDIS_HOST: {{ include "aegispay.redisHost" . | quote }}
  REDIS_PORT: {{ .Values.global.redis.port | quote }}
  MONGODB_URI: {{ include "aegispay.mongoUri" . | quote }}
  OAUTH2_JWK_SET_URI: {{ include "aegispay.jwkSetUri" . | quote }}
  SERVER_PORT: "8088"
  # SPRING_APPLICATION_JSON overrides Spring properties at runtime without rebuild.
  #
  # spring.ai.anthropic.chat.base-url — redirect the Spring AI Anthropic client to
  # OpenRouter's Anthropic-compatible endpoint instead of api.anthropic.com.
  # The ANTHROPIC_API_KEY env var carries the sk-or-v1-* OpenRouter key.
  #
  # spring.ai.anthropic.chat.options.model — OpenRouter requires the fully-qualified
  # provider/model-name format (e.g. "anthropic/claude-sonnet-4-5") not just the
  # short alias used by Anthropic direct API.
  SPRING_APPLICATION_JSON: >-
    {
      "spring": {
        "ai": {
          "anthropic": {
            "chat": {
              "base-url": "https://openrouter.ai/api/v1",
              "options": {
                "model": "anthropic/claude-sonnet-4-5"
              }
            }
          }
        }
      },
      "aegispay": {
        "triage": {"project-root": "/app"}
      }
    }
{{- end }}
