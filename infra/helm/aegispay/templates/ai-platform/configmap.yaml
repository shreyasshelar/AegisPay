{{- if .Values.services.ai_platform.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-platform-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aegispay.labels" . | nindent 4 }}
    app.kubernetes.io/name: ai-platform
data:
  DB_HOST: {{ .Values.global.postgresql.host | quote }}
  DB_PORT: {{ .Values.global.postgresql.port | quote }}
  DB_USERNAME: {{ .Values.global.postgresql.username | quote }}
  DB_NAME: "aegispay_ai"
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.global.kafka.brokers | quote }}
  REDIS_HOST: {{ .Values.global.redis.host | quote }}
  REDIS_PORT: {{ .Values.global.redis.port | quote }}
  MONGODB_URI: {{ .Values.global.mongodb.uri | quote }}
  OAUTH2_JWK_SET_URI: {{ .Values.global.oauth2.jwkSetUri | quote }}
  SERVER_PORT: "8088"
  # Override via SPRING_APPLICATION_JSON to ensure correct Spring property binding
  SPRING_APPLICATION_JSON: '{"aegispay":{"triage":{"project-root":"/app"}}}'
{{- end }}
