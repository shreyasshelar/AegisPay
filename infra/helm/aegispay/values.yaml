# ─────────────────────────────────────────────────────────────────────────────
# AegisPay Helm Chart — Base Values
# All environment-specific overrides live in values-{env}.yaml
# ─────────────────────────────────────────────────────────────────────────────

global:
  namespace: aegispay
  imageRegistry: ghcr.io
  imageRepositoryPrefix: ghcr.io/aegispay-org/aegispay
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

  # Shared infrastructure endpoints (overridden per env)
  kafka:
    brokers: "kafka-headless.aegispay-infra.svc.cluster.local:9092"
  postgresql:
    host: "postgresql.aegispay-infra.svc.cluster.local"
    port: "5432"
    username: "aegispay"
  redis:
    host: "redis-master.aegispay-infra.svc.cluster.local"
    port: "6379"
  mongodb:
    uri: "mongodb://mongodb.aegispay-infra.svc.cluster.local:27017"
  oauth2:
    issuerUri: "http://keycloak.aegispay-infra.svc.cluster.local:8080/realms/aegispay"

# ─── Service definitions ──────────────────────────────────────────────────────
services:
  api_gateway:
    enabled: true
    image:
      repository: api-gateway
      tag: latest
    replicas: 2
    port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    ingress:
      enabled: false
      className: nginx
      hosts:
        - host: api.aegispay.io
      tls: []
      annotations: {}
    rateLimiter:
      maxRequests: 100
      windowSeconds: 60
      keyTtlSeconds: 65
    extraOauth2Issuers: []

  user_service:
    enabled: true
    image:
      repository: user-service
      tag: latest
    replicas: 2
    port: 8081
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

  transaction_service:
    enabled: true
    image:
      repository: transaction-service
      tag: latest
    replicas: 3
    port: 8082
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1500m
        memory: 1536Mi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 12
      targetCPUUtilizationPercentage: 65

  ledger_service:
    enabled: true
    image:
      repository: ledger-service
      tag: latest
    replicas: 3
    port: 8083
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1500m
        memory: 1536Mi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 12
      targetCPUUtilizationPercentage: 65

  payment_orchestrator:
    enabled: true
    image:
      repository: payment-orchestrator
      tag: latest
    replicas: 2
    port: 8084
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70

  risk_engine:
    enabled: true
    image:
      repository: risk-engine
      tag: latest
    replicas: 2
    port: 8085
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1500m
        memory: 1536Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70

  notification_service:
    enabled: true
    image:
      repository: notification-service
      tag: latest
    replicas: 2
    port: 8086
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 800m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

  ai_platform:
    enabled: true
    image:
      repository: ai-platform
      tag: latest
    replicas: 2
    port: 8088
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 60

# ─── Ingress (api-gateway only) ───────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  host: api.aegispay.io
  tls:
    enabled: false
    secretName: aegispay-tls

# ─── Pod disruption budgets ──────────────────────────────────────────────────
pdb:
  minAvailable: 1

# ─── External Secrets Operator ───────────────────────────────────────────────
secrets:
  useVault: false          # true = Vault, false = AWS Secrets Manager
  vault:
    address: "https://vault.aegispay-infra.svc.cluster.local:8200"
    path: "aegispay"
    role: "aegispay-app"
  aws:
    region: "ap-south-1"
  db:
    secretPath: "aegispay/db"
  redis:
    secretPath: "aegispay/redis"
  ai:
    secretPath: "aegispay/ai-keys"
  kafka:
    secretPath: "aegispay/kafka"

# ─── Monitoring & Alerting ───────────────────────────────────────────────────
monitoring:
  prometheusRules:
    enabled: true
  thresholds:
    sagaTimeoutRatePerMin: 0.1
    kafkaConsumerLagMax: 5000
