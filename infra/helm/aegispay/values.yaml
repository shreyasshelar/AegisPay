# ─────────────────────────────────────────────────────────────────────────────
# AegisPay Helm Chart — Base Values
# All environment-specific overrides live in values-{env}.yaml
# ─────────────────────────────────────────────────────────────────────────────

global:
  namespace: aegispay
  # ── Single source of truth for the backing-services namespace ─────────────────
  # All cluster-internal FQDNs (kafka, postgres, redis, mongo, keycloak, clickhouse)
  # are derived from this ONE value by named helpers in _helpers.tpl.
  # Change infraNamespace here → every service ConfigMap updates automatically.
  # Override per-env in values-{env}.yaml only if the infra namespace differs.
  infraNamespace: "aegispay-infra"
  imageRegistry: ghcr.io
  imageRepositoryPrefix: ghcr.io/shreyasshelar/aegispay
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

  # Shared infrastructure endpoints
  # ── Leave blank ("") to auto-construct from global.infraNamespace ─────────────
  # Set explicitly ONLY to override for non-standard deployments (e.g. external broker).
  # Constructors live in _helpers.tpl — grep "aegispay.pgHost" etc.
  kafka:
    brokers: ""     # aegispay.kafkaBroker  → kafka.<infraNs>.svc.cluster.local:9092
  postgresql:
    host: ""        # aegispay.pgHost       → postgresql.<infraNs>.svc.cluster.local
    port: "5432"
    username: "aegispay"
  redis:
    host: ""        # aegispay.redisHost    → redis-master.<infraNs>.svc.cluster.local
    port: "6379"
  mongodb:
    uri: ""         # aegispay.mongoUri     → mongodb://mongodb.<infraNs>.svc.cluster.local:27017
  oauth2:
    # Public issuer URL — set per-env (values-dev.yaml / values-prod.yaml).
    # KC_HOSTNAME on Keycloak ensures JWT iss always matches this URL.
    # Used by: web (KEYCLOAK_ISSUER), api-gateway (issuer-uri + trusted-issuers).
    issuerUri: ""
    # aegispay.jwkSetUri → http://keycloak.<infraNs>.svc.cluster.local:8080/realms/aegispay/...certs
    jwkSetUri: ""
    # aegispay.keycloakInternalUrl → http://keycloak.<infraNs>.svc.cluster.local:8080/realms/aegispay
    # Used by the web pod (NextAuth) for server-side OIDC discovery + token exchange.
    # Avoids Cloudflare hairpin on every NextAuth server-side call.
    keycloakInternalUrl: ""
  clickhouse:
    url: ""         # aegispay.clickhouseJdbcUrl → jdbc:clickhouse://clickhouse.<infraNs>.svc.cluster.local:8123/aegispay_analytics
    username: "default"
  smtp:
    host: "smtp.gmail.com"
    port: "587"
    username: ""          # set per-env or via ExternalSecret
    fromAddress: ""       # set per-env

# ─── Service definitions ──────────────────────────────────────────────────────
services:
  api_gateway:
    enabled: true
    image:
      repository: api-gateway
      tag: latest
    replicas: 2
    port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    ingress:
      enabled: false
      className: nginx
      hosts:
        - host: api.aegispay.io
      tls: []
      annotations: {}
    rateLimiter:
      maxRequests: 100
      windowSeconds: 60
      keyTtlSeconds: 65
    extraOauth2Issuers: []

  user_service:
    enabled: true
    image:
      repository: user-service
      tag: latest
    replicas: 2
    port: 8081
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    extraEnv:
      # Redis password — application.yml falls back to "aegispay_dev" without this;
      # Redis requires auth so registration (idempotency key check) fails with
      # RedisConnectionFailureException, causing social login users to get 500 on /register.
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-redis-secret
            key: password
      # Keycloak master-realm admin password for KeycloakAdminService.fetchAdminToken().
      # Uses password grant against master realm (admin-cli client) because service-account
      # tokens in the aegispay realm lack resource_access.realm-management roles in JWT
      # claims → admin REST API returns 403 even with manage-users role assigned.
      - name: KEYCLOAK_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-keycloak-secret
            key: password

  transaction_service:
    enabled: true
    image:
      repository: transaction-service
      tag: latest
    replicas: 3
    port: 8082
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1500m
        memory: 1536Mi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 12
      targetCPUUtilizationPercentage: 65
    extraEnv:
      # Redis idempotency key store — application.yml falls back to "aegispay_dev"
      # which is wrong in production; the real password is in aegispay-redis-secret.
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-redis-secret
            key: password
      - name: MONGO_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-mongodb-secret
            key: password
      - name: MONGODB_URI
        # TODO(infraNamespace): hostname should be derived from global.infraNamespace.
        # Cannot use Helm templates in values.yaml — stays static until moved to _helpers.tpl deployment template.
        value: "mongodb://aegispay:$(MONGO_PASSWORD)@mongodb.aegispay-infra.svc.cluster.local:27017/aegispay?authSource=admin"

  ledger_service:
    enabled: true
    image:
      repository: ledger-service
      tag: latest
    replicas: 3
    port: 8083
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1500m
        memory: 1536Mi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 12
      targetCPUUtilizationPercentage: 65
    extraEnv:
      # Redis idempotency key store — application.yml falls back to "aegispay_dev"
      # which is wrong in production; the real password is in aegispay-redis-secret.
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-redis-secret
            key: password
      # Stripe key for POST /api/v1/ledger/topup/intent — application.yml falls back
      # to "sk_test_placeholder_local_dev" when STRIPE_SECRET_KEY is not set,
      # which Stripe rejects with 422 "Invalid API Key".
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: aegispay-stripe-secret
            key: secret-key

  payment_orchestrator:
    enabled: true
    image:
      repository: payment-orchestrator
      tag: latest
    replicas: 2
    port: 8084
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
    extraEnv:
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: aegispay-stripe-secret
            key: secret-key
      - name: STRIPE_WEBHOOK_SECRET
        valueFrom:
          secretKeyRef:
            name: aegispay-stripe-webhook-secret   # separate secret, separate ESO
            key: webhook-secret

  risk_engine:
    enabled: true
    image:
      repository: risk-engine
      tag: latest
    replicas: 2
    port: 8085
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1500m
        memory: 1536Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
    extraEnv:
      # Redis blacklist / idempotency store — application.yml falls back to "aegispay_dev"
      # which is wrong in production; the real password is in aegispay-redis-secret.
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-redis-secret
            key: password

  notification_service:
    enabled: true
    image:
      repository: notification-service
      tag: latest
    replicas: 2
    port: 8086
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 800m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    extraEnv:
      - name: SMTP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-smtp-secret
            key: password
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: aegispay-slack-secret
            key: webhook-url
            optional: true   # Slack is optional — service starts without it
      - name: FAST2SMS_API_KEY
        valueFrom:
          secretKeyRef:
            name: aegispay-fast2sms-secret
            key: api-key
            optional: true   # SMS is optional — service starts without it
      # Shared secret for X-Internal-Api-Key calls to user-service.
      # Used by UserServiceFallbackClient to lazily provision UserContactDocument
      # when user.registered Kafka event was not yet consumed.
      # Must match USER_SERVICE_INTERNAL_API_KEY in user-service (same secret in GCP SM).
      # Defaults to "aegispay-internal-dev-key" if the secret doesn't exist yet.
      - name: USER_SERVICE_INTERNAL_API_KEY
        valueFrom:
          secretKeyRef:
            name: aegispay-internal-api-secret
            key: api-key
            optional: true   # Falls back to default "aegispay-internal-dev-key" in dev
      - name: MONGO_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-mongodb-secret
            key: password
      - name: MONGODB_URI
        # TODO(infraNamespace): hostname should be derived from global.infraNamespace.
        # Cannot use Helm templates in values.yaml — stays static until moved to _helpers.tpl deployment template.
        value: "mongodb://aegispay:$(MONGO_PASSWORD)@mongodb.aegispay-infra.svc.cluster.local:27017/aegispay?authSource=admin"

  ai_platform:
    enabled: true
    image:
      repository: ai-platform
      tag: latest
    replicas: 2
    port: 8091
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 60
    extraEnv:
      # ANTHROPIC_API_KEY: prod profile (AnthropicChatModel direct).
      # OPENROUTER_API_KEY: dev profile (OpenAiChatModel via OpenRouter, Authorization: Bearer).
      # We use OpenRouter as the provider (sk-or-v1-* key) with the base-url
      # overridden to https://openrouter.ai/api/v1 via SPRING_APPLICATION_JSON
      # in the configmap, so the same Anthropic client works through OpenRouter.
      - name: ANTHROPIC_API_KEY
        valueFrom:
          secretKeyRef:
            name: aegispay-ai-secret
            key: openrouter-api-key
      - name: OPENROUTER_API_KEY
        valueFrom:
          secretKeyRef:
            name: aegispay-ai-secret
            key: openrouter-api-key
      - name: MONGO_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-mongodb-secret
            key: password
            optional: true
      - name: MONGODB_URI
        # TODO(infraNamespace): hostname should be derived from global.infraNamespace.
        # Cannot use Helm templates in values.yaml — stays static until moved to _helpers.tpl deployment template.
        value: "mongodb://aegispay:$(MONGO_PASSWORD)@mongodb.aegispay-infra.svc.cluster.local:27017/aegispay_ai?authSource=admin"

  data_pipeline:
    enabled: true
    image:
      repository: data-pipeline
      tag: latest
    replicas: 2
    port: 8089
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    extraEnv:
      - name: CLICKHOUSE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-clickhouse-secret
            key: password

  reconciliation_service:
    enabled: true
    image:
      repository: reconciliation-service
      tag: latest
    replicas: 1          # batch job — single instance is fine
    port: 8087
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: false     # reconciliation is scheduled, not latency-sensitive
    initContainers:
      - name: wait-for-ledger
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            until wget -q --spider http://ledger-service:8083/actuator/health/readiness 2>/dev/null; do
              echo "waiting for ledger-service..."; sleep 5
            done
    extraEnv:
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: aegispay-stripe-secret
            key: secret-key
      - name: CLICKHOUSE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: aegispay-clickhouse-secret
            key: password

# ─── Web (Next.js frontend) ──────────────────────────────────────────────────
  web:
    enabled: true
    image:
      repository: web
      tag: latest
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      apiBaseUrl: "https://aegispay-api.shreyasshelar.uk"
      wsBaseUrl: "wss://aegispay-ws.shreyasshelar.uk"
      nextauthUrl: "https://aegispay.shreyasshelar.uk"
      keycloakClientId: "aegispay-web"

# ─── Ingress (api-gateway only) ───────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  host: api.aegispay.io
  tls:
    enabled: false
    secretName: aegispay-tls

# ─── Pod disruption budgets ──────────────────────────────────────────────────
pdb:
  minAvailable: 1

# ─── External Secrets Operator ───────────────────────────────────────────────
# Backend is selected by environment overlay (values-{env}.yaml):
#   useGcpSm: true    → GCP Secret Manager (dev/GCP — ClusterSecretStore)
#   useVault: true    → HashiCorp Vault     (future prod option — namespace SecretStore)
#   neither           → AWS Secrets Manager (future prod option — namespace SecretStore)
#
# secretName  = GCP Secret Manager resource name (used when useGcpSm: true)
# secretPath  = Vault/AWS path                   (used when useGcpSm: false)
# Defaults here must satisfy helm lint (run with values.yaml + values-dev.yaml,
# where useGcpSm: true). values-gcp.yaml overrides secretName with actuals.
secrets:
  useGcpSm: false          # overridden to true in values-gcp.yaml / values-dev.yaml
  useVault: false          # overridden to true in values-prod.yaml if Vault used
  gcpSm:
    projectId: ""          # overridden per-env (values-gcp.yaml)
  vault:
    address: ""    # placeholder — Vault removed (P3-5); kept for future prod option
    path: "aegispay"
    role: "aegispay-app"
  aws:
    region: "ap-south-1"
  db:
    secretPath: "aegispay/db"
    secretName: "aegispay-db-password"
  redis:
    secretPath: "aegispay/redis"
    secretName: "aegispay-redis-password"
  mongo:
    secretName: "aegispay-mongo-password"
  kafka:
    secretPath: "aegispay/kafka"
    secretName: "aegispay-kafka-password"
  ai:
    secretPath: "aegispay/ai-keys"
    secretName: "aegispay-openrouter-api-key"
  stripe:
    secretPath: "aegispay/stripe"
    secretName: "aegispay-stripe-secret-key"
    webhookSecretName: "aegispay-stripe-webhook-secret"
  smtp:
    secretPath: "aegispay/smtp"
    secretName: "aegispay-smtp-password"
  slack:
    secretPath: "aegispay/slack"
    secretName: "aegispay-slack-webhook-url"
  fast2sms:
    secretPath: "aegispay/fast2sms"
    secretName: "aegispay-fast2sms-api-key"
  clickhouse:
    secretPath: "aegispay/clickhouse"
    secretName: "aegispay-clickhouse-password"
  cloudflare:
    secretName: "aegispay-cloudflare-tunnel-token"
  web:
    nextauthSecretName: "aegispay-nextauth-secret"
    keycloakClientSecretName: "aegispay-keycloak-web-client-secret"

# ─── ClickHouse ──────────────────────────────────────────────────────────────
clickhouse:
  host: ""    # derived: aegispay.clickhouseHost → clickhouse.<infraNs>.svc.cluster.local
  port: 9000
  user: default
  initJob:
    enabled: true
    clientVersion: "24.4"

# ─── Grafana (ClickHouse analytics dashboards) ───────────────────────────────
# This deploys a dedicated Grafana for AegisPay's ClickHouse analytics.
# Separate from kube-prometheus-stack's Grafana (which covers Prometheus metrics).
grafana:
  enabled: true
  image:
    tag: "10.4.2"
  port: 3100
  replicas: 1
  adminUser: admin
  # adminPassword is read from the grafana-admin-secret K8s secret (managed by ESO).
  # Set grafana.adminPasswordPlain only for non-prod environments where ESO is not used.
  adminPasswordPlain: ""
  adminPasswordSecret:
    name: grafana-admin-secret
    key: admin-password
  persistence:
    enabled: true
    storageClassName: ""    # empty = use cluster default StorageClass
    size: 5Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: false
    className: nginx
    host: grafana.aegispay.io
    tls:
      enabled: false
      secretName: grafana-tls
    annotations: {}
  plugins:
    - grafana-clickhouse-datasource
  # ClickHouse datasource — points at the in-cluster ClickHouse
  # host is derived from global.infraNamespace via aegispay.clickhouseHost helper
  clickhouseDatasource:
    host: ""    # derived
    port: 9000
    username: "default"
    database: "aegispay_analytics"
    # password is empty in dev; in prod it is read from aegispay-clickhouse-secret
    passwordSecretRef:
      name: aegispay-clickhouse-secret
      key: password

# ─── Monitoring & Alerting ───────────────────────────────────────────────────
monitoring:
  prometheusRules:
    enabled: true
  thresholds:
    sagaTimeoutRatePerMin: 0.1
    kafkaConsumerLagMax: 5000
    notificationErrorRatePerMin: 0.5   # alert if >0.5 notification failures/min
    dataPipelineSinkErrorsPerMin: 0.2  # alert if ClickHouse sink errors exceed threshold
    reconciliationBreakCount: 5        # alert if unresolved breaks exceed this