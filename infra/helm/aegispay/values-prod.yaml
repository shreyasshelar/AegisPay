# ─────────────────────────────────────────────────────────────────────────────
# Production environment overrides
# Image tags updated ONLY via manual promotion workflow
# ─────────────────────────────────────────────────────────────────────────────

global:
  namespace: aegispay-prod
  imagePullPolicy: IfNotPresent

services:
  api_gateway:
    replicas: 3
    image:
      tag: latest
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10

  user_service:
    replicas: 3
    image:
      tag: latest

  transaction_service:
    replicas: 5
    image:
      tag: latest
    autoscaling:
      minReplicas: 5
      maxReplicas: 20

  ledger_service:
    replicas: 5
    image:
      tag: latest
    autoscaling:
      minReplicas: 5
      maxReplicas: 20

  payment_orchestrator:
    replicas: 3
    image:
      tag: latest

  risk_engine:
    replicas: 4
    image:
      tag: latest

  notification_service:
    replicas: 3
    image:
      tag: latest

  ai_platform:
    replicas: 3
    image:
      tag: latest

  data_pipeline:
    replicas: 2
    image:
      tag: latest
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70

  reconciliation_service:
    replicas: 1
    image:
      tag: latest

global:
  smtp:
    host: "smtp.gmail.com"
    port: "587"
    username: "aegispay.dev@gmail.com"
    fromAddress: "aegispay.dev@gmail.com"

ingress:
  enabled: true
  host: api.aegispay.io
  tls:
    enabled: true
    secretName: aegispay-prod-tls

pdb:
  minAvailable: 2

monitoring:
  prometheusRules:
    enabled: true
  thresholds:
    sagaTimeoutRatePerMin: 0.05     # tighter threshold in prod
    kafkaConsumerLagMax: 2000

secrets:
  useVault: true
  vault:
    address: https://vault.aegispay-prod.svc.cluster.local:8200
    path: aegispay/prod
    role: aegispay-prod-app
  db:
    secretPath: aegispay/prod/db
  redis:
    secretPath: aegispay/prod/redis
  ai:
    secretPath: aegispay/prod/ai-keys
  kafka:
    secretPath: aegispay/prod/kafka
  stripe:
    secretPath: aegispay/prod/stripe
  smtp:
    secretPath: aegispay/prod/smtp
  slack:
    secretPath: aegispay/prod/slack
  fast2sms:
    secretPath: aegispay/prod/fast2sms
  clickhouse:
    secretPath: aegispay/prod/clickhouse

grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: gp3
    size: 20Gi
  ingress:
    enabled: true
    className: nginx
    host: grafana.aegispay.io
    tls:
      enabled: true
      secretName: grafana-prod-tls
    annotations:
      nginx.ingress.kubernetes.io/auth-type: basic
      nginx.ingress.kubernetes.io/auth-secret: grafana-basic-auth
  alerting:
    opsEmail: "ops@aegispay.shreyasshelar.uk"
    slackWebhookSecretRef:
      name: aegispay-slack-secret
      key: webhook-url
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

monitoring:
  thresholds:
    sagaTimeoutRatePerMin: 0.05
    kafkaConsumerLagMax: 2000
    notificationErrorRatePerMin: 0.2
    dataPipelineSinkErrorsPerMin: 0.1
    reconciliationBreakCount: 2
