# ─────────────────────────────────────────────────────────────────────────────
# Dev environment overrides
# Image tags are patched here by the CD pipeline (cd-dev.yml via yq)
# ─────────────────────────────────────────────────────────────────────────────

global:
  namespace: aegispay-dev
  imagePullPolicy: Always

services:
  api_gateway:
    replicas: 1
    image:
      tag: latest  # patched by CI: yq e '.services.api_gateway.image.tag = "<sha>"'
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
    ingress:
      enabled: true
      hosts:
        - host: api.dev.aegispay.io
      tls: []
    rateLimiter:
      maxRequests: 200

  user_service:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false

  transaction_service:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
    autoscaling:
      enabled: false

  ledger_service:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
    autoscaling:
      enabled: false

  payment_orchestrator:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false

  risk_engine:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false

  notification_service:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false

  ai_platform:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: false

  data_pipeline:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false

  reconciliation_service:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false

  clickhouse:
    url: "jdbc:clickhouse://clickhouse.aegispay-infra.svc.cluster.local:8123/aegispay_analytics"
    username: "default"
  smtp:
    host: "smtp.gmail.com"
    port: "587"
    username: "aegispay.dev@gmail.com"
    fromAddress: "aegispay.dev@gmail.com"

secrets:
  useVault: false
  aws:
    region: ap-south-1
  db:
    secretPath: "aegispay/dev/db"
  redis:
    secretPath: "aegispay/dev/redis"
  ai:
    secretPath: "aegispay/dev/ai-keys"
  kafka:
    secretPath: "aegispay/dev/kafka"
  stripe:
    secretPath: "aegispay/dev/stripe"
  smtp:
    secretPath: "aegispay/dev/smtp"
  slack:
    secretPath: "aegispay/dev/slack"
  fast2sms:
    secretPath: "aegispay/dev/fast2sms"
  clickhouse:
    secretPath: "aegispay/dev/clickhouse"

grafana:
  enabled: true
  adminPasswordPlain: "admin"      # plain text for dev — no ESO needed
  adminPasswordSecret:
    name: ""                       # empty = use adminPasswordPlain
    key: ""
  persistence:
    enabled: false                 # ephemeral in dev is fine
  ingress:
    enabled: true
    className: nginx
    host: grafana.dev.aegispay.io
    tls:
      enabled: false
