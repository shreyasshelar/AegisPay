# ─────────────────────────────────────────────────────────────────────────────
# AegisPay App — Dev / k3s values
#
# Overrides values.yaml for a self-hosted single server running k3s.
# Images pulled from GHCR (public repo → no registry auth needed).
# Ingress via Traefik (k3s default) + Cloudflare Tunnel for external access.
# Secrets pulled from GCP Secret Manager via External Secrets Operator (ESO).
# AI via OpenRouter (free tier) instead of Anthropic direct.
# Stripe in test-mode sandbox (sk_test_...).
# ─────────────────────────────────────────────────────────────────────────────

global:
  namespace: aegispay
  # Backing-services namespace — all cluster-internal FQDNs are derived from this.
  # Helpers in _helpers.tpl construct kafka/postgres/redis/mongo/keycloak/clickhouse URLs.
  infraNamespace: "aegispay-infra"
  imageRegistry: ghcr.io
  # Repository name matches the GitHub repo owner/repo-name pattern.
  imageRepositoryPrefix: ghcr.io/shreyasshelar/aegispay
  imagePullPolicy: Always
  imagePullSecrets: [] # GHCR public repo → no pull secret needed
  oauth2:
    # Public URL — used by: web (KEYCLOAK_ISSUER), api-gateway (issuer-uri, trusted-issuers).
    # KC_HOSTNAME on Keycloak ensures JWT iss claim always matches this public URL.
    issuerUri: "https://aegispay-keycloak.shreyasshelar.uk/realms/aegispay"
    # All internal URLs (jwkSetUri, keycloakInternalUrl) are derived from infraNamespace.
    # No need to list them here — _helpers.tpl constructs them automatically.
  smtp:
    host: "smtp.gmail.com"
    port: "587"
    username: "aegispay.dev@gmail.com"
    fromAddress: "aegispay.dev@gmail.com"
# ─── Secrets backend ──────────────────────────────────────────────────────────
# GCP Secret Manager is the only secrets backend for dev/GCP.
# values-gcp.yaml (applied after this file) sets useGcpSm: true which gates
# all ESO ClusterSecretStore references in externalsecrets.yaml.
secrets:
  useGcpSm: true # ESO ClusterSecretStore → GCP Secret Manager
  db:
    secretPath: "secret/data/aegispay/database"
  redis:
    secretPath: "secret/data/aegispay/redis"
  kafka:
    secretPath: "secret/data/aegispay/kafka"
  ai:
    secretPath: "secret/data/aegispay/ai-keys"
  # AI provider fallback chain — each provider activated when secretName is set.
  # GCP SM secrets created; ESO service account granted secretAccessor role.
  groq:
    secretName: "aegispay-groq-api-key" # GCP SM → aegispay-groq-secret K8s secret
  gemini:
    secretName: "aegispay-gemini-api-key" # GCP SM → aegispay-gemini-secret K8s secret
  stripe:
    secretPath: "secret/data/aegispay/stripe"
  smtp:
    secretPath: "secret/data/aegispay/smtp"
  slack:
    secretPath: "secret/data/aegispay/slack"
  fast2sms:
    secretPath: "secret/data/aegispay/fast2sms"
  clickhouse:
    secretPath: "secret/data/aegispay/clickhouse"
  keycloak:
    secretPath: "secret/data/aegispay/keycloak"
# ─── Services — single replica, reduced resources for dev ────────────────────
# JVM tuned with -XX:MaxRAMPercentage=50 so each container uses at most
# half its memory limit (prevents OOMKills when all services start at once).
# ─────────────────────────────────────────────────────────────────────────────
services:
  api_gateway:
    enabled: true
    image:
      repository: api-gateway
      tag: dev-e0994b47e39efcb45f0e5a1564ed481561337147
    replicas: 1
    port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false # single node — no point in HPA
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: aegispay-api.shreyasshelar.uk
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: aegispay-api-tls
          hosts:
            - aegispay-api.shreyasshelar.uk
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
  user_service:
    enabled: true
    image:
      repository: user-service
      tag: dev-e0994b47e39efcb45f0e5a1564ed481561337147
    replicas: 1
    port: 8081
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
    db:
      name: aegispay_users
  transaction_service:
    enabled: true
    image:
      repository: transaction-service
      tag: dev-e0994b47e39efcb45f0e5a1564ed481561337147
    replicas: 1
    port: 8082
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
    db:
      name: aegispay_transactions
  ledger_service:
    enabled: true
    image:
      repository: ledger-service
      tag: dev-e0994b47e39efcb45f0e5a1564ed481561337147
    replicas: 1
    port: 8083
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
    db:
      name: aegispay_ledger
  payment_orchestrator:
    enabled: true
    image:
      repository: payment-orchestrator
      tag: dev-e0994b47e39efcb45f0e5a1564ed481561337147
    replicas: 1
    port: 8084
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
    db:
      name: aegispay_sagas
  risk_engine:
    enabled: true
    image:
      repository: risk-engine
      tag: dev-e0994b47e39efcb45f0e5a1564ed481561337147
    replicas: 1
    port: 8085
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
    db:
      name: aegispay_risk
  notification_service:
    enabled: true
    image:
      repository: notification-service
      tag: dev-e0994b47e39efcb45f0e5a1564ed481561337147
    replicas: 1
    port: 8086
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
      limits:
        cpu: 300m
        memory: 384Mi
    autoscaling:
      enabled: false
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        # WebSocket upgrade support
        traefik.ingress.kubernetes.io/service.serversscheme: http
      hosts:
        - host: aegispay-ws.shreyasshelar.uk
          paths:
            - path: /ws
              pathType: Prefix
      tls:
        - secretName: aegispay-ws-tls
          hosts:
            - aegispay-ws.shreyasshelar.uk
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
  data_pipeline:
    enabled: true
    image:
      repository: data-pipeline
      tag: dev-3804380a376cd190995e17137b9acea538b15a30
    replicas: 1
    port: 8089
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 400m
        memory: 384Mi
    autoscaling:
      enabled: false
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
  reconciliation_service:
    enabled: true
    image:
      repository: reconciliation-service
      tag: dev-771f91f14ef8b569afdc0beb9aa857dffb48cd89
    replicas: 1
    port: 8087
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 400m
        memory: 512Mi
    autoscaling:
      enabled: false
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
  ai_platform:
    enabled: true
    image:
      repository: ai-platform
      tag: dev-3be8fb0ca061035a7d4942bebbaa5e33883ed406
    replicas: 1
    port: 8088
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: false
    # OpenRouter replaces Anthropic on dev.
    # OPENROUTER_API_KEY injected via ESO from GCP Secret Manager (aegispay-ai-secret)
    springProfile: dev
    jvmOpts: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC -XX:+UseContainerSupport"
    db:
      name: aegispay_ai
  # ── Web (Next.js) — routed via Cloudflare tunnel, no Traefik Ingress needed
  web:
    enabled: true
    image:
      repository: web
      tag: dev-4508e6dff0828b9b665bcd0207bbe4cb8d1691a0
    # Updated by cd-dev.yml on every successful web image build.
    # Injected as a pod annotation so ArgoCD detects a spec change and rolls
    # the pod even when the image tag stays "dev-latest" (reused tag scenario).
    deployTimestamp: "4508e6dff0828b9b665bcd0207bbe4cb8d1691a0"
    replicas: 1
    port: 3000
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false # single node — HPA not useful on dev
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
    env:
      apiBaseUrl: "https://aegispay-api.shreyasshelar.uk"
      wsBaseUrl: "wss://aegispay-ws.shreyasshelar.uk"
      nextauthUrl: "https://aegispay.shreyasshelar.uk"
      keycloakClientId: "aegispay-web"
# ─── Grafana (ClickHouse analytics) ──────────────────────────────────────────
grafana:
  enabled: true
  # Cloudflare tunnel routes aegispay-grafana.shreyasshelar.uk → :3100
  # GF_SERVER_HTTP_PORT and K8s Service port match Cloudflare config.
  port: 3100
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi
  ingress:
    enabled: true
    className: traefik
    host: aegispay-grafana.shreyasshelar.uk
    tls:
      enabled: true
      secretName: grafana-tls
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
  alerting:
    opsEmail: "aegispay.dev@gmail.com"
    slackWebhookSecretRef:
      name: aegispay-slack-secret
      key: webhook-url
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  clickhouseDatasource:
    # host derived from global.infraNamespace via aegispay.clickhouseHost helper
    port: 9000
    username: "default"
    database: "aegispay_analytics"
    passwordSecretRef:
      name: aegispay-clickhouse-secret
      key: password
# ─── Monitoring ───────────────────────────────────────────────────────────────
monitoring:
  prometheusRules:
    enabled: true
  thresholds:
    sagaTimeoutRatePerMin: 0.1
    kafkaConsumerLagMax: 5000
    notificationErrorRatePerMin: 0.5
    dataPipelineSinkErrorsPerMin: 0.2
    reconciliationBreakCount: 5
# ─── ClickHouse — disabled on dev (ClickHouse not deployed in dev cluster) ────
# The initJob would otherwise block every ArgoCD sync waiting for a connection
# that never comes. Re-enable when ClickHouse is deployed (infra/helm/infra).
clickhouse:
  initJob:
    enabled: false
# ─── Storage class ────────────────────────────────────────────────────────────
# local-path is the default k3s StorageClass — backed by a hostPath on your server.
defaultStorageClass: local-path
