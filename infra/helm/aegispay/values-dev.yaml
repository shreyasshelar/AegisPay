        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false

  notification_service:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false

  ai_platform:
    replicas: 1
