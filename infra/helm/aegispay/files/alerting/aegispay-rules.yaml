apiVersion: 1

# ── Contact points ─────────────────────────────────────────────────────────────
# Slack disabled — Grafana 10.4 rejects ${ENV_VAR} webhook URLs at parse time.
# Re-enable via Grafana UI: Alerting → Contact points → aegispay-ops → Add Slack.

contactPoints:
  - orgId: 1
    name: aegispay-ops
    receivers:
      - uid: aegispay-email
        type: email
        settings:
          addresses: aegispay.dev@gmail.com
          subject: >
            [AegisPay] {{ .Status | toUpper }} — {{ .CommonLabels.alertname }}

# ── Notification policy ────────────────────────────────────────────────────────
policies:
  - orgId: 1
    receiver: aegispay-ops
    group_by: [alertname, service]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: aegispay-ops
        matchers:
          - severity =~ "critical|high"
        group_wait: 10s
        repeat_interval: 1h

# ── Alert rules ────────────────────────────────────────────────────────────────
# NOTE: ClickHouse-based alert rules re-enabled with proper relative time ranges.
# Previously disabled due to {From:0s To:0s} syntax — now fixed.

groups:
  # ── Kafka / DLQ ──────────────────────────────────────────────────────────────
  - orgId: 1
    name: kafka-dlq
    folder: AegisPay
    interval: 1m
    rules:
      - uid: aegis-dlq-depth
        title: Kafka DLQ Depth > 0
        condition: C
        data:
          - refId: A
            datasourceUid: aegispay-clickhouse
            model:
              rawSql: |
                SELECT
                  topic_name,
                  count() AS dlq_messages
                FROM aegispay_analytics.kafka_dlq_events
                WHERE occurred_at >= now() - INTERVAL 5 MINUTE
                GROUP BY topic_name
                HAVING dlq_messages > 0
              format: table
          - refId: C
            datasourceUid: __expr__
            model:
              type: reduce
              reducer: sum
              expression: A
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          severity: high
          service: kafka
        annotations:
          summary: "Kafka DLQ has unprocessed messages"
          description: "Messages are accumulating in a Kafka Dead Letter Queue. Manual reprocessing may be required."

  # ── Saga health ───────────────────────────────────────────────────────────────
  - orgId: 1
    name: saga-health
    folder: AegisPay
    interval: 2m
    rules:
      - uid: aegis-saga-stuck
        title: Saga Stuck (no terminal state in 10 min)
        condition: C
        data:
          - refId: A
            datasourceUid: aegispay-clickhouse
            model:
              rawSql: |
                SELECT count() AS stuck_sagas
                FROM aegispay_analytics.saga_latencies
                WHERE
                  final_status NOT IN ('COMPLETED', 'ROLLED_BACK', 'FAILED')
                  AND started_at < now() - INTERVAL 10 MINUTE
              format: table
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: critical
          service: payment-orchestrator
        annotations:
          summary: "Payment saga(s) stuck — no terminal state after 10 minutes"
          description: "One or more sagas have been in a non-terminal state for over 10 minutes."

  # ── Reconciliation ────────────────────────────────────────────────────────────
  - orgId: 1
    name: reconciliation
    folder: AegisPay
    interval: 30m
    rules:
      - uid: aegis-reconciliation-mismatch
        title: Reconciliation Mismatch Detected
        condition: C
        data:
          - refId: A
            datasourceUid: aegispay-clickhouse
            model:
              rawSql: |
                SELECT count() AS mismatches
                FROM aegispay_analytics.reconciliation_results
                WHERE run_at >= now() - INTERVAL 1 HOUR
                  AND status = 'MISMATCH'
              format: table
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels:
          severity: critical
          service: reconciliation-service
        annotations:
          summary: "Ledger reconciliation mismatch detected"
          description: "The reconciliation service has found a discrepancy between ledger entries and Stripe settlement data."
