apiVersion: 1

# ── Contact points ─────────────────────────────────────────────────────────────
# Alert rules are managed via Grafana UI (Alerting → Alert rules) because
# Grafana 10.x provisioning requires explicit timeRange fields that differ
# per datasource query type. Add rules in the UI — they persist in the PVC.

contactPoints:
  - orgId: 1
    name: aegispay-ops
    receivers:
      - uid: aegispay-email
        type: email
        settings:
          addresses: aegispay.dev@gmail.com
          subject: >
            [AegisPay] {{ .Status | toUpper }} — {{ .CommonLabels.alertname }}

# ── Notification policy ────────────────────────────────────────────────────────
policies:
  - orgId: 1
    receiver: aegispay-ops
    group_by: [alertname, service]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: aegispay-ops
        matchers:
          - severity =~ "critical|high"
        group_wait: 10s
        repeat_interval: 1h
