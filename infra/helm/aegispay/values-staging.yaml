# ─────────────────────────────────────────────────────────────────────────────
# Staging environment overrides
# Closer to prod sizing; image tags updated by cd-staging.yml
# ─────────────────────────────────────────────────────────────────────────────

global:
  namespace: aegispay-staging
  imagePullPolicy: IfNotPresent

services:
  api_gateway:
    replicas: 2
    image:
      tag: latest
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4

  user_service:
    replicas: 2
    image:
      tag: latest

  transaction_service:
    replicas: 2
    image:
      tag: latest

  ledger_service:
    replicas: 2
    image:
      tag: latest

  payment_orchestrator:
    replicas: 2
    image:
      tag: latest

  risk_engine:
    replicas: 2
    image:
      tag: latest

  notification_service:
    replicas: 2
    image:
      tag: latest

  ai_platform:
    replicas: 1
    image:
      tag: latest

  data_pipeline:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 150m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 768Mi
    autoscaling:
      enabled: false

  reconciliation_service:
    replicas: 1
    image:
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

global:
  smtp:
    host: "smtp.gmail.com"
    port: "587"
    username: "aegispay.dev@gmail.com"
    fromAddress: "aegispay.dev@gmail.com"

ingress:
  enabled: true
  host: api.staging.aegispay.io
  tls:
    enabled: true
    secretName: aegispay-staging-tls

monitoring:
  prometheusRules:
    enabled: true

secrets:
  useVault: false
  aws:
    region: ap-south-1
  db:
    secretPath: aegispay/staging/db
  redis:
    secretPath: aegispay/staging/redis
  ai:
    secretPath: aegispay/staging/ai-keys
  kafka:
    secretPath: aegispay/staging/kafka
  stripe:
    secretPath: aegispay/staging/stripe
  smtp:
    secretPath: aegispay/staging/smtp
  slack:
    secretPath: aegispay/staging/slack
  fast2sms:
    secretPath: aegispay/staging/fast2sms
  clickhouse:
    secretPath: aegispay/staging/clickhouse

grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: gp3
    size: 5Gi
  ingress:
    enabled: true
    className: nginx
    host: grafana.staging.aegispay.io
    tls:
      enabled: true
      secretName: grafana-staging-tls
