apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: aegispay-clickhouse
    isDefault: true
    jsonData:
      host: clickhouse          # docker-compose service name
      port: 9000                # native protocol port
      username: default
      defaultDatabase: aegispay_analytics
      protocol: native
      secure: false
      # Dial timeout in seconds
      dialTimeout: 10
      queryTimeout: 60
    secureJsonData:
      password: ""              # empty for local dev; override via env in prod
    editable: true
