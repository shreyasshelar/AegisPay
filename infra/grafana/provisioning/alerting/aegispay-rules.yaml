apiVersion: 1

# ── Contact points ─────────────────────────────────────────────────────────────
# Default routes go to the "aegispay-ops" contact point.
# Override SLACK_WEBHOOK_URL and OPS_EMAIL env vars at runtime.

contactPoints:
  - orgId: 1
    name: aegispay-ops
    receivers:
      # Slack disabled — Grafana 10.4 rejects ${ENV_VAR} webhook URLs at parse time.
      # Re-enable via Grafana UI: Alerting → Contact points → aegispay-ops → Add Slack.
      - uid: aegispay-email
        type: email
        settings:
          addresses: sshelar110.ss3@gmail.com
          subject: >
            [AegisPay] {{ .Status | toUpper }} — {{ .CommonLabels.alertname }}

# ── Notification policy ────────────────────────────────────────────────────────
policies:
  - orgId: 1
    receiver: aegispay-ops
    group_by: [alertname, service]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: aegispay-ops
        matchers:
          - severity =~ "critical|high"
        group_wait: 10s
        repeat_interval: 1h
