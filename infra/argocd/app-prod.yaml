apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegispay-prod
  namespace: argocd
  labels:
    environment: prod
    app.kubernetes.io/part-of: aegispay
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: aegispay

  source:
    repoURL: https://github.com/shreyasshelar/AegisPay.git
    targetRevision: main
    path: infra/helm/aegispay
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: aegispay-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 20

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
