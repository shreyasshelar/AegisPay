apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegispay-prod
  namespace: argocd
  labels:
    environment: prod
    app.kubernetes.io/part-of: aegispay
  annotations:
    # Require explicit sync annotation to prevent accidental prod deploys
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: aegispay

  source:
    repoURL: https://github.com/shreyasshelar/AegisPay.git
    # Prod tracks release tags only — never auto-deploys from main.
    # Update this value manually via cd-prod.yml when promoting a release.
    targetRevision: v0.0.0   # placeholder — overwritten by cd-prod.yml on every release
    path: infra/helm/aegispay
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: aegispay-prod

  syncPolicy:
    # Production: fully manual — operator must click Sync in ArgoCD UI
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 2
      backoff:
        duration: 60s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
