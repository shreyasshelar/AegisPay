apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: aegispay
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: AegisPay fintech platform — all environments

  # Only deploy from this repo
  sourceRepos:
    - https://github.com/shreyasshelar/AegisPay.git

  destinations:
    - namespace: aegispay           # GCP free-tier + dev (single-node k3s)
      server: https://kubernetes.default.svc
    - namespace: aegispay-infra     # backing services (Kafka, Postgres, Redis…)
      server: https://kubernetes.default.svc
    - namespace: aegispay-dev
      server: https://kubernetes.default.svc
    - namespace: aegispay-staging
      server: https://kubernetes.default.svc
    - namespace: aegispay-prod
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  # Allowed resource types
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    # Required for pod-cleanup CronJob RBAC — ClusterRole/ClusterRoleBinding let
    # the cleanup SA list+delete pods across all namespaces (aegispay + aegispay-infra).
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding

  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: "apps"
      kind: ReplicaSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: ServiceAccount
    - group: "autoscaling"
      kind: HorizontalPodAutoscaler
    - group: "policy"
      kind: PodDisruptionBudget
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "networking.k8s.io"
      kind: NetworkPolicy
    - group: "external-secrets.io"
      kind: ExternalSecret
    - group: "external-secrets.io"
      kind: SecretStore
    - group: "external-secrets.io"
      kind: ClusterSecretStore
    - group: "monitoring.coreos.com"
      kind: ServiceMonitor
    - group: "monitoring.coreos.com"
      kind: PrometheusRule
    - group: ""
      kind: PersistentVolumeClaim
    - group: "apps"
      kind: StatefulSet
    - group: "batch"
      kind: Job
    - group: "batch"
      kind: CronJob
    - group: ""
      kind: Secret
    - group: "rbac.authorization.k8s.io"
      kind: Role
    - group: "rbac.authorization.k8s.io"
      kind: RoleBinding

  # Role: CI/CD can sync any app in this project
  roles:
    - name: ci-deployer
      description: Pipeline role for automated deployments
      policies:
        - p, proj:aegispay:ci-deployer, applications, sync, aegispay/*, allow
        - p, proj:aegispay:ci-deployer, applications, get, aegispay/*, allow
      jwtTokens: []
