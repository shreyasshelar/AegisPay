apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegispay-gcp
  namespace: argocd
  labels:
    environment: gcp
    app.kubernetes.io/part-of: aegispay
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: aegispay-alerts
spec:
  project: aegispay

  source:
    repoURL: https://github.com/shreyasshelar/AegisPay.git
    # GCP K3s is the dev environment — tracks dev branch
    targetRevision: dev
    path: infra/helm/aegispay
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml   # resource sizing, domains, JVM tuning
        - values-gcp.yaml   # GCP SM secrets backend override

  destination:
    server: https://kubernetes.default.svc
    namespace: aegispay

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true          # only touch resources that actually drifted
      - RespectIgnoreDifferences=true   # ignoreDifferences items don't count as OutOfSync
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    # Ingress on k3s+Cloudflare never gets an ADDRESS (no LB)
    - group: networking.k8s.io
      kind: Ingress
      jsonPointers:
        - /status/loadBalancer
    # ESO mutates ExternalSecrets after creation (adds finalizer, sets spec defaults
    # like deletionPolicy/conversionStrategy, writes status). Ignore all fields owned
    # by the ESO controller so only Helm-managed fields count toward OutOfSync.
    - group: external-secrets.io
      kind: ExternalSecret
      managedFieldsManagers:
        - external-secrets
      jqPathExpressions:
        - .metadata.finalizers
        - .metadata.annotations
        - .status
