version: 2
updates:
  # ── Java / Maven — all services get the same grouping strategy ───────────────
  # Groups reduce 80+ individual PRs to ~3 per service (spring, test, other).
  # Auto-merge workflow handles patch/minor merges automatically.

  - package-ecosystem: maven
    directory: /services/api-gateway
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, java]
    groups:
      spring:
        patterns: ["org.springframework*", "io.micrometer*", "io.github.resilience4j*"]
        update-types: [minor, patch]
      deps:
        update-types: [patch]

  - package-ecosystem: maven
    directory: /services/user-service
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, java]
    groups:
      spring:
        patterns: ["org.springframework*", "io.micrometer*"]
        update-types: [minor, patch]
      deps:
        update-types: [patch]

  - package-ecosystem: maven
    directory: /services/transaction-service
