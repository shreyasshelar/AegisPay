    open-pull-requests-limit: 5
    labels: [dependencies, java]
    groups:
      spring:
        patterns: ["org.springframework*", "io.micrometer*"]
        update-types: [minor, patch]
      deps:
        update-types: [patch]

  - package-ecosystem: maven
    directory: /services/ai-platform
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, java]
    groups:
      spring:
        patterns: ["org.springframework*", "io.micrometer*"]
        update-types: [minor, patch]
      deps:
        update-types: [patch]

  - package-ecosystem: maven
    directory: /services/data-pipeline
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, java]
    groups:
      spring:
        patterns: ["org.springframework*", "io.micrometer*"]
        update-types: [minor, patch]
      deps:
        update-types: [patch]

  # ── npm (Next.js web app + monorepo packages) ────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: [dependencies, javascript]
    groups:
      next-ecosystem:
        patterns: ["next", "react", "react-dom", "@types/react*", "@types/node"]
      radix-ui:
        patterns: ["@radix-ui/*"]
      testing:
        patterns: ["vitest", "playwright", "@testing-library/*", "@playwright/*"]
      turbo-typescript:
        patterns: ["turbo", "typescript", "@typescript-eslint/*"]

  # ── Docker base images ───────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /services/api-gateway
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/transaction-service
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/user-service
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/payment-orchestrator
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/risk-engine
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/ledger-service
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/notification-service
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/reconciliation-service
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/ai-platform
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /services/data-pipeline
    schedule:
      interval: monthly
    labels: [dependencies, docker]

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    groups:
      actions:
        update-types: [minor, patch]
