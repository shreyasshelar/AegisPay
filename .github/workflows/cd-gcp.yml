# ─────────────────────────────────────────────────────────────────────────────
# AegisPay — CD: GCP K3s  [DISABLED — superseded by cd-dev.yml]
#
# dev is now the sole GCP deployment branch.
# cd-dev.yml handles all GCP K3s deployments triggered from dev.
#
# This file is kept for reference / future prod promotion use.
# Auto-trigger from main has been removed — manual dispatch only.
# ─────────────────────────────────────────────────────────────────────────────
name: CD — GCP K3s (legacy — manual only)

on:
  # Auto-trigger DISABLED: dev is the deployment branch, handled by cd-dev.yml
  # workflow_run was removed to prevent accidental main deploys.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Git SHA or tag to deploy (e.g. abc1234)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aegispay
  GCP_VALUES_FILE: infra/helm/aegispay/values-gcp.yaml
  JAVA_SERVICES: >-
    api-gateway
    user-service
    transaction-service
    ledger-service
    payment-orchestrator
    risk-engine
    notification-service
    ai-platform
    data-pipeline
    reconciliation-service

jobs:
  guard:
    name: Guard — check CI result
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      deploy_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve deploy SHA
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

  update-image-tags:
    name: Update image tags in values-gcp.yaml
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "shreyasshelar"
          git config user.email "shreyasshelarrr@gmail.com"

      - name: Update image tags
        env:
          SHA: ${{ needs.guard.outputs.deploy_sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          FILE="${{ env.GCP_VALUES_FILE }}"

          # values-gcp.yaml inherits service definitions from values-dev.yaml.
          # We patch image tags there using yq for each Java service.
          # Install yq
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

          # Patch the image tag for each service in values-dev.yaml
          # (values-gcp.yaml only overrides secrets, so tags live in values-dev.yaml)
          DEV_VALUES="infra/helm/aegispay/values-dev.yaml"
          for svc in ${{ env.JAVA_SERVICES }}; do
            # Convert kebab-case service name to snake_case for yaml key
            key=$(echo "$svc" | tr '-' '_')
            yq e ".services.${key}.image.tag = \"${SHORT_SHA}\"" -i "$DEV_VALUES"
          done
          yq e ".services.web.image.tag = \"${SHORT_SHA}\"" -i "$DEV_VALUES"

          git add "$DEV_VALUES"
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(gcp): deploy ${SHORT_SHA} to GCP K3s [skip ci]"
          git push

      - name: Summary
        run: |
          echo "### GCP Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Image tag: \`${{ needs.guard.outputs.deploy_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "ArgoCD will sync automatically within 3 minutes." >> "$GITHUB_STEP_SUMMARY"
          echo "Monitor: https://argocd.aegispay.shreyasshelar.uk" >> "$GITHUB_STEP_SUMMARY"
