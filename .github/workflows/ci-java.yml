  # ── Step 5: Patch Helm values & trigger ArgoCD (prod branch push only) ───────
  # Only runs when at least one Docker job actually pushed a new image.
  update-helm-tags:
    name: Update Helm Image Tags
    runs-on: ubuntu-latest
    needs:
      - docker-api-gateway
      - docker-user-service
      - docker-transaction-service
      - docker-ledger-service
      - docker-payment-orchestrator
      - docker-risk-engine
      - docker-notification-service
      - docker-ai-platform
      - docker-reconciliation-service
      - docker-data-pipeline
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (
        needs.docker-api-gateway.result == 'success' ||
        needs.docker-user-service.result == 'success' ||
        needs.docker-transaction-service.result == 'success' ||
        needs.docker-ledger-service.result == 'success' ||
        needs.docker-payment-orchestrator.result == 'success' ||
        needs.docker-risk-engine.result == 'success' ||
        needs.docker-notification-service.result == 'success' ||
        needs.docker-ai-platform.result == 'success' ||
        needs.docker-reconciliation-service.result == 'success' ||
        needs.docker-data-pipeline.result == 'success'
      )
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        uses: mikefarah/yq@v4.44.2

      - name: Patch image tags for changed services
        env:
          SHA: ${{ github.sha }}
        run: |
          patch_tag() {
            local svc="$1"
            local key="$2"
            yq e ".services.${key}.image.tag = \"${SHA}\"" -i infra/helm/aegispay/values-prod.yaml
            echo "Patched ${svc} → ${SHA}"
          }
          [[ "${{ needs.docker-api-gateway.result }}"            == "success" ]] && patch_tag api-gateway          api_gateway
          [[ "${{ needs.docker-user-service.result }}"           == "success" ]] && patch_tag user-service         user_service
          [[ "${{ needs.docker-transaction-service.result }}"    == "success" ]] && patch_tag transaction-service  transaction_service
          [[ "${{ needs.docker-ledger-service.result }}"         == "success" ]] && patch_tag ledger-service       ledger_service
          [[ "${{ needs.docker-payment-orchestrator.result }}"   == "success" ]] && patch_tag payment-orchestrator payment_orchestrator
          [[ "${{ needs.docker-risk-engine.result }}"            == "success" ]] && patch_tag risk-engine          risk_engine
          [[ "${{ needs.docker-notification-service.result }}"   == "success" ]] && patch_tag notification-service notification_service
          [[ "${{ needs.docker-ai-platform.result }}"            == "success" ]] && patch_tag ai-platform          ai_platform
          [[ "${{ needs.docker-reconciliation-service.result }}" == "success" ]] && patch_tag reconciliation-service reconciliation_service
          [[ "${{ needs.docker-data-pipeline.result }}"          == "success" ]] && patch_tag data-pipeline        data_pipeline

      - name: Commit updated image tags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/aegispay/values-prod.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push
