# ─────────────────────────────────────────────────────────────────────────────
# AegisPay — Smart Java CI
#
# Change-detection strategy:
#   • Runs on push to main/dev AND on pull_requests targeting main/dev
#   • dorny/paths-filter detects WHICH services changed
#   • Each service job only runs if its own files changed, OR if shared libs
#     changed (because every service imports common-*)
#   • Docker images are built & pushed to GHCR only on push to main
#     (prod branch); PRs and dev branch skip Docker push
#   • Helm tag update only runs on push to main after all Docker jobs succeed
# ─────────────────────────────────────────────────────────────────────────────
name: CI — Java (Smart)

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'libs/**'
      - 'services/**'
      - 'pom.xml'
      - '.github/workflows/ci-java.yml'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'libs/**'
      - 'services/**'
      - 'pom.xml'
      - '.github/workflows/ci-java.yml'

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aegispay

# Cancel in-flight runs for the same branch/PR when a new push arrives
concurrency:
  group: ci-java-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Step 0: Detect which services actually changed ──────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      libs:                   ${{ steps.filter.outputs.libs }}
      api-gateway:            ${{ steps.filter.outputs.api-gateway }}
      user-service:           ${{ steps.filter.outputs.user-service }}
      transaction-service:    ${{ steps.filter.outputs.transaction-service }}
      ledger-service:         ${{ steps.filter.outputs.ledger-service }}
      payment-orchestrator:   ${{ steps.filter.outputs.payment-orchestrator }}
      risk-engine:            ${{ steps.filter.outputs.risk-engine }}
      notification-service:   ${{ steps.filter.outputs.notification-service }}
      ai-platform:            ${{ steps.filter.outputs.ai-platform }}
      reconciliation-service: ${{ steps.filter.outputs.reconciliation-service }}
      data-pipeline:          ${{ steps.filter.outputs.data-pipeline }}
      helm:                   ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
        with:
          # full history so dorny can compare base refs on PRs
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            libs:
              - 'libs/**'
              - 'pom.xml'
            api-gateway:
              - 'services/api-gateway/**'
            user-service:
              - 'services/user-service/**'
            transaction-service:
              - 'services/transaction-service/**'
            ledger-service:
              - 'services/ledger-service/**'
            payment-orchestrator:
              - 'services/payment-orchestrator/**'
            risk-engine:
              - 'services/risk-engine/**'
            notification-service:
              - 'services/notification-service/**'
            ai-platform:
              - 'services/ai-platform/**'
            reconciliation-service:
              - 'services/reconciliation-service/**'
            data-pipeline:
              - 'services/data-pipeline/**'
            helm:
              - 'infra/helm/**'

  # ── Step 1: Build + install shared libs ────────────────────────────────────
  # Runs whenever ANY java code changed (libs or any service).
  # Saves the installed aegispay JARs to a per-SHA cache so service jobs
  # can restore them without recompiling.
  build-libs:
    name: Build Shared Libs
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.libs == 'true' ||
      needs.detect-changes.outputs['api-gateway'] == 'true' ||
      needs.detect-changes.outputs['user-service'] == 'true' ||
      needs.detect-changes.outputs['transaction-service'] == 'true' ||
      needs.detect-changes.outputs['ledger-service'] == 'true' ||
      needs.detect-changes.outputs['payment-orchestrator'] == 'true' ||
      needs.detect-changes.outputs['risk-engine'] == 'true' ||
      needs.detect-changes.outputs['notification-service'] == 'true' ||
      needs.detect-changes.outputs['ai-platform'] == 'true' ||
      needs.detect-changes.outputs['reconciliation-service'] == 'true' ||
      needs.detect-changes.outputs['data-pipeline'] == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build & install shared libs
        run: |
          mvn --batch-mode --no-transfer-progress clean install \
            -pl libs/common-domain,libs/common-security,libs/common-kafka,libs/common-observability \
            -DskipTests

      # Save the installed aegispay JARs so service jobs don't recompile them
      - name: Save libs cache
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}

  # ── Step 2: Build + test each changed service ───────────────────────────────
  # A service runs if:
  #   (a) its own files changed, OR
  #   (b) shared libs changed (every service depends on them)
  # Cache restore uses the per-SHA key with a branch-level fallback so the
  # first run on a new SHA still gets a warm cache from the previous commit.

  build-api-gateway:
    name: Build api-gateway
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['api-gateway'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/api-gateway -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-api-gateway, path: services/api-gateway/target/surefire-reports/ }

  build-user-service:
    name: Build user-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['user-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/user-service -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-user-service, path: services/user-service/target/surefire-reports/ }

  build-transaction-service:
    name: Build transaction-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['transaction-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/transaction-service -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-transaction-service, path: services/transaction-service/target/surefire-reports/ }

  build-ledger-service:
    name: Build ledger-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['ledger-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/ledger-service -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-ledger-service, path: services/ledger-service/target/surefire-reports/ }

  build-payment-orchestrator:
    name: Build payment-orchestrator
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['payment-orchestrator'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/payment-orchestrator -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-payment-orchestrator, path: services/payment-orchestrator/target/surefire-reports/ }

  build-risk-engine:
    name: Build risk-engine
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['risk-engine'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/risk-engine -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-risk-engine, path: services/risk-engine/target/surefire-reports/ }

  build-notification-service:
    name: Build notification-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['notification-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/notification-service -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-notification-service, path: services/notification-service/target/surefire-reports/ }

  build-ai-platform:
    name: Build ai-platform
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['ai-platform'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/ai-platform -Dspring.profiles.active=test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-ai-platform, path: services/ai-platform/target/surefire-reports/ }

  build-reconciliation-service:
    name: Build reconciliation-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['reconciliation-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/reconciliation-service -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-reconciliation-service, path: services/reconciliation-service/target/surefire-reports/ }

  build-data-pipeline:
    name: Build data-pipeline
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['data-pipeline'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -pl services/data-pipeline -Dspring.profiles.active=test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-data-pipeline, path: services/data-pipeline/target/surefire-reports/ }

  # ── Step 3: Helm lint ───────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.15.0 }
      - name: Lint Helm chart
        run: helm lint infra/helm/aegispay

  # ── Step 4: Docker build & push (prod branch push only) ─────────────────────
  # Skipped entirely on PRs and dev branch.
  # Each docker job only fires if its corresponding build job succeeded.

  docker-api-gateway:
    name: Docker — api-gateway
    runs-on: ubuntu-latest
    needs: build-api-gateway
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build-api-gateway.result == 'success'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - run: mvn --batch-mode --no-transfer-progress package -pl services/api-gateway -DskipTests
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/api-gateway
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-user-service:
    name: Docker — user-service
    runs-on: ubuntu-latest
    needs: build-user-service
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-user-service.result == 'success'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with: { path: ~/.m2/repository/com/aegispay, key: "aegispay-libs-${{ github.sha }}", restore-keys: "aegispay-libs-" }
      - run: mvn --batch-mode --no-transfer-progress package -pl services/user-service -DskipTests
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/user-service
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with: { context: ., file: services/user-service/Dockerfile, push: true, tags: "${{ steps.meta.outputs.tags }}", cache-from: "type=gha", cache-to: "type=gha,mode=max" }

  docker-transaction-service:
    name: Docker — transaction-service
    runs-on: ubuntu-latest
    needs: build-transaction-service
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-transaction-service.result == 'success'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with: { path: ~/.m2/repository/com/aegispay, key: "aegispay-libs-${{ github.sha }}", restore-keys: "aegispay-libs-" }
      - run: mvn --batch-mode --no-transfer-progress package -pl services/transaction-service -DskipTests
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/transaction-service
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with: { context: ., file: services/transaction-service/Dockerfile, push: true, tags: "${{ steps.meta.outputs.tags }}", cache-from: "type=gha", cache-to: "type=gha,mode=max" }

  docker-ledger-service:
    name: Docker — ledger-service
    runs-on: ubuntu-latest
    needs: build-ledger-service
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-ledger-service.result == 'success'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with: { path: ~/.m2/repository/com/aegispay, key: "aegispay-libs-${{ github.sha }}", restore-keys: "aegispay-libs-" }
      - run: mvn --batch-mode --no-transfer-progress package -pl services/ledger-service -DskipTests
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/ledger-service
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with: { context: ., file: services/ledger-service/Dockerfile, push: true, tags: "${{ steps.meta.outputs.tags }}", cache-from: "type=gha", cache-to: "type=gha,mode=max" }

  docker-payment-orchestrator:
    name: Docker — payment-orchestrator
    runs-on: ubuntu-latest
    needs: build-payment-orchestrator
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-payment-orchestrator.result == 'success'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with: { path: ~/.m2/repository/com/aegispay, key: "aegispay-libs-${{ github.sha }}", restore-keys: "aegispay-libs-" }
      - run: mvn --batch-mode --no-transfer-progress package -pl services/payment-orchestrator -DskipTests
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/payment-orchestrator
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with: { context: ., file: services/payment-orchestrator/Dockerfile, push: true, tags: "${{ steps.meta.outputs.tags }}", cache-from: "type=gha", cache-to: "type=gha,mode=max" }

  docker-risk-engine:
    name: Docker — risk-engine
    runs-on: ubuntu-latest
    needs: build-risk-engine
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-risk-engine.result == 'success'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with: { path: ~/.m2/repository/com/aegispay, key: "aegispay-libs-${{ github.sha }}", restore-keys: "aegispay-libs-" }
      - run: mvn --batch-mode --no-transfer-progress package -pl services/risk-engine -DskipTests
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/risk-engine
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with: { context: ., file: services/risk-engine/Dockerfile, push: true, tags: "${{ steps.meta.outputs.tags }}", cache-from: "type=gha", cache-to: "type=gha,mode=max" }

  docker-notification-service:
    name: Docker — notification-service
    runs-on: ubuntu-latest
    needs: build-notification-service
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-notification-service.result == 'success'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
