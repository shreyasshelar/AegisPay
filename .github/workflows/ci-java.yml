# ─────────────────────────────────────────────────────────────────────────────
# AegisPay — Smart Java CI  (dev branch only)
#
# dev is the sole deployment branch — main is not built/deployed.
#
# Change-detection strategy:
#   • Push to dev (or pull_requests targeting dev)
#   • dorny/paths-filter detects WHICH services changed
#   • Each service job only runs if its own files changed, OR if shared libs
#     changed (because every service imports common-*)
#   • Helm lint runs when infra/helm/** changes (so infra commits get CI too)
#   • Docker images are built & pushed by cd-dev.yml (not here)
# ─────────────────────────────────────────────────────────────────────────────
name: CI — Java (Smart)

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: "Build all services regardless of changes (true/false)"
        required: false
        default: "true"
        type: string
  push:
    branches:
      - dev
    paths:
      - 'libs/**'
      - 'services/**'
      - 'pom.xml'
      - 'infra/helm/**'
      - '.github/workflows/ci-java.yml'
  pull_request:
    branches:
      - dev
    paths:
      - 'libs/**'
      - 'services/**'
      - 'pom.xml'
      - 'infra/helm/**'
      - '.github/workflows/ci-java.yml'

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aegispay

# Cancel in-flight runs for the same branch/PR when a new push arrives
concurrency:
  group: ci-java-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Step 0: Detect which services actually changed ──────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      libs:                   ${{ steps.force.outputs.libs || steps.filter.outputs.libs }}
      api-gateway:            ${{ steps.force.outputs.api-gateway || steps.filter.outputs.api-gateway }}
      user-service:           ${{ steps.force.outputs.user-service || steps.filter.outputs.user-service }}
      transaction-service:    ${{ steps.force.outputs.transaction-service || steps.filter.outputs.transaction-service }}
      ledger-service:         ${{ steps.force.outputs.ledger-service || steps.filter.outputs.ledger-service }}
      payment-orchestrator:   ${{ steps.force.outputs.payment-orchestrator || steps.filter.outputs.payment-orchestrator }}
      risk-engine:            ${{ steps.force.outputs.risk-engine || steps.filter.outputs.risk-engine }}
      notification-service:   ${{ steps.force.outputs.notification-service || steps.filter.outputs.notification-service }}
      ai-platform:            ${{ steps.force.outputs.ai-platform || steps.filter.outputs.ai-platform }}
      reconciliation-service: ${{ steps.force.outputs.reconciliation-service || steps.filter.outputs.reconciliation-service }}
      data-pipeline:          ${{ steps.force.outputs.data-pipeline || steps.filter.outputs.data-pipeline }}
      helm:                   ${{ steps.force.outputs.helm || steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force all changed (workflow_dispatch with force_all=true)
        id: force
        if: github.event_name == 'workflow_dispatch' && inputs.force_all == 'true'
        run: |
          for svc in libs api-gateway user-service transaction-service ledger-service \
                     payment-orchestrator risk-engine notification-service ai-platform \
                     reconciliation-service data-pipeline helm; do
            echo "${svc}=true" >> "$GITHUB_OUTPUT"
          done

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch' || inputs.force_all != 'true'
        with:
          filters: |
            libs:
              - 'libs/**'
              - 'pom.xml'
            api-gateway:
              - 'services/api-gateway/**'
            user-service:
              - 'services/user-service/**'
            transaction-service:
              - 'services/transaction-service/**'
            ledger-service:
              - 'services/ledger-service/**'
            payment-orchestrator:
              - 'services/payment-orchestrator/**'
            risk-engine:
              - 'services/risk-engine/**'
            notification-service:
              - 'services/notification-service/**'
            ai-platform:
              - 'services/ai-platform/**'
            reconciliation-service:
              - 'services/reconciliation-service/**'
            data-pipeline:
              - 'services/data-pipeline/**'
            helm:
              - 'infra/helm/**'

  # ── Step 1: Build + install shared libs ────────────────────────────────────
  # Runs whenever ANY java code changed (libs or any service).
  # Saves the installed aegispay JARs to a per-SHA cache so service jobs
  # can restore them without recompiling.
  build-libs:
    name: Build Shared Libs
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.libs == 'true' ||
      needs.detect-changes.outputs['api-gateway'] == 'true' ||
      needs.detect-changes.outputs['user-service'] == 'true' ||
      needs.detect-changes.outputs['transaction-service'] == 'true' ||
      needs.detect-changes.outputs['ledger-service'] == 'true' ||
      needs.detect-changes.outputs['payment-orchestrator'] == 'true' ||
      needs.detect-changes.outputs['risk-engine'] == 'true' ||
      needs.detect-changes.outputs['notification-service'] == 'true' ||
      needs.detect-changes.outputs['ai-platform'] == 'true' ||
      needs.detect-changes.outputs['reconciliation-service'] == 'true' ||
      needs.detect-changes.outputs['data-pipeline'] == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build & install shared libs
        run: |
          # Install parent POMs first (non-recursive) so service jobs can resolve
          # the dependency chain: common-domain → aegispay-libs → aegispay-parent
          mvn --batch-mode --no-transfer-progress install -N
          mvn --batch-mode --no-transfer-progress install -N -f libs/pom.xml
          # Now build and install all lib modules
          mvn --batch-mode --no-transfer-progress clean install \
            -pl libs/common-domain,libs/common-security,libs/common-kafka,libs/common-observability \
            -DskipTests

      # Save installed aegispay JARs + parent POMs so service jobs don't recompile them
      - name: Save libs cache
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}

  # ── Step 2: Build + test each changed service ───────────────────────────────
  # A service runs if:
  #   (a) its own files changed, OR
  #   (b) shared libs changed (every service depends on them)
  # Cache restore uses the per-SHA key with a branch-level fallback so the
  # first run on a new SHA still gets a warm cache from the previous commit.

  build-api-gateway:
    name: Build api-gateway
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['api-gateway'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/api-gateway
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-api-gateway, path: services/api-gateway/target/surefire-reports/ }

  build-user-service:
    name: Build user-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['user-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/user-service
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-user-service, path: services/user-service/target/surefire-reports/ }

  build-transaction-service:
    name: Build transaction-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['transaction-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/transaction-service
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-transaction-service, path: services/transaction-service/target/surefire-reports/ }

  build-ledger-service:
    name: Build ledger-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['ledger-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/ledger-service
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-ledger-service, path: services/ledger-service/target/surefire-reports/ }

  build-payment-orchestrator:
    name: Build payment-orchestrator
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['payment-orchestrator'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/payment-orchestrator
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-payment-orchestrator, path: services/payment-orchestrator/target/surefire-reports/ }

  build-risk-engine:
    name: Build risk-engine
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['risk-engine'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/risk-engine
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-risk-engine, path: services/risk-engine/target/surefire-reports/ }

  build-notification-service:
    name: Build notification-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['notification-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/notification-service
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-notification-service, path: services/notification-service/target/surefire-reports/ }

  build-ai-platform:
    name: Build ai-platform
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['ai-platform'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/ai-platform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-ai-platform, path: services/ai-platform/target/surefire-reports/ }

  build-reconciliation-service:
    name: Build reconciliation-service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['reconciliation-service'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/reconciliation-service
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-reconciliation-service, path: services/reconciliation-service/target/surefire-reports/ }

  build-data-pipeline:
    name: Build data-pipeline
    runs-on: ubuntu-latest
    needs: [detect-changes, build-libs]
    if: |
      needs.detect-changes.outputs['data-pipeline'] == 'true' ||
      needs.detect-changes.outputs.libs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "${{ env.JAVA_VERSION }}", distribution: temurin, cache: maven }
      - uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/aegispay
          key: aegispay-libs-${{ github.sha }}
          restore-keys: aegispay-libs-
      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress package -DskipTests -pl services/data-pipeline
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results-data-pipeline, path: services/data-pipeline/target/surefire-reports/ }

  # ── Step 3: Helm lint ───────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.15.0 }
      - name: Lint Helm chart
        run: |
          helm lint infra/helm/aegispay \
            -f infra/helm/aegispay/values.yaml \
            -f infra/helm/aegispay/values-dev.yaml \
            --set global.namespace=aegispay

  # Docker build & push is handled by cd-dev.yml (triggered after this CI passes).
  # Nothing to do here on dev — cd-dev.yml detects which services changed and
