name: CD — Deploy to Staging

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.2.3

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aegispay
  HELM_VALUES_FILE: infra/helm/aegispay/values-staging.yaml

jobs:
  build-and-push:
    name: Build & push release images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - transaction-service
          - ledger-service
          - payment-orchestrator
          - risk-engine
          - notification-service
          - ai-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build shared libs
        run: |
          mvn --batch-mode --no-transfer-progress install \
            -pl libs/common-domain,libs/common-security,libs/common-kafka,libs/common-observability \
            -DskipTests

      - name: Package ${{ matrix.service }}
        run: |
          mvn --batch-mode --no-transfer-progress package \
            -pl services/${{ matrix.service }} --also-make -DskipTests

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Update staging Helm values & sync
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_DEPLOY_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "aegispay-ci[bot]"
          git config user.email "aegispay-ci@users.noreply.github.com"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in values-staging.yaml
        run: |
          SERVICES=(api-gateway user-service transaction-service ledger-service payment-orchestrator risk-engine notification-service ai-platform)
          for svc in "${SERVICES[@]}"; do
            KEY=$(echo "$svc" | tr '-' '_')
            yq e ".services.${KEY}.image.tag = \"${{ github.ref_name }}\"" -i ${{ env.HELM_VALUES_FILE }}
          done

      - name: Commit and push
        run: |
          git add ${{ env.HELM_VALUES_FILE }}
          git commit -m "chore(cd): promote ${{ github.ref_name }} to staging"
          git push origin main
