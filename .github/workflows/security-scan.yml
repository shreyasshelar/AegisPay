name: Security Scan

on:
  # Run on every PR to dev so vulnerabilities are caught before merge
  pull_request:
    branches: [dev]
    paths:
      - 'services/**'
      - 'libs/**'
      - 'pom.xml'
      - '.github/workflows/security-scan.yml'
  workflow_dispatch:
  # Weekly full scan
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 02:00 UTC

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run OWASP dependency-check
        run: |
          mvn --batch-mode --no-transfer-progress \
            org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionsLocation=.github/owasp-suppressions.xml \
            --no-transfer-progress || true

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  trivy-scan:
    name: Trivy Image Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - transaction-service
          - ledger-service
          - payment-orchestrator
          - risk-engine
          - notification-service
          - ai-platform
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/${{ github.repository_owner }}/aegispay/${{ matrix.service }}:latest"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build for CodeQL
        run: mvn --batch-mode --no-transfer-progress compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
