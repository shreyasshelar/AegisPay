# ─────────────────────────────────────────────────────────────────────────────
# AegisPay — CD: Production  [DISABLED — not yet active]
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  DEV vs PROD ISOLATION — CRITICAL                                       │
# │                                                                         │
# │  dev branch  → cd-dev.yml   → builds ghcr.io/.../svc:dev-<sha>         │
# │                             → patches values-dev.yaml on dev branch     │
# │                             → ArgoCD syncs GCP K3s (dev cluster)        │
# │                                                                         │
# │  main branch → cd-prod.yml  → validates ghcr.io/.../svc:prod-<sha>     │
# │             (this file)     → patches values-prod.yaml on main branch   │
# │                             → ArgoCD syncs prod cluster                 │
# │                                                                         │
# │  Image tags NEVER overlap: dev-* and prod-* are strictly separate.      │
# │  values-dev.yaml and values-prod.yaml are strictly separate.            │
# │  A dev image can NEVER reach the prod cluster.                          │
# └─────────────────────────────────────────────────────────────────────────┘
#
# PREREQUISITE (before enabling this workflow):
#   A separate "CI — Java (Prod)" workflow must run on main, building and
#   pushing images tagged prod-<sha>. See COMPROMISED-FEATURES.md P3-6.
#   Until that workflow exists, do NOT enable the auto-trigger below.
#
# To enable:
#   1. Merge or create ci-java-prod.yml on main (builds prod-<sha> images)
#   2. Uncomment the workflow_run trigger below
#   3. Create infra/helm/aegispay/values-prod.yaml
#   4. Create infra/argocd/app-prod.yaml
#   5. Set ARGOCD_SERVER repo variable + ARGOCD_TOKEN secret
# ─────────────────────────────────────────────────────────────────────────────
name: CD — Production (main branch, manual only)

on:
  # Auto-trigger DISABLED: ci-java-prod.yml does not exist yet (see COMPROMISED P3-6).
  # Uncomment ONLY after prod image-build CI is in place on main:
  # workflow_run:
  #   workflows: ["CI — Java (Prod)"]
  #   types: [completed]
  #   branches: [main]

  # Manual: promote a specific git tag to production.
  # release_tag must match a prod-<sha> image that already exists in GHCR.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git SHA to deploy (e.g. abc1234) — must have prod-<sha> images in GHCR"
        required: true
        type: string
      dry_run:
        description: "Dry run — update files but do not push to main"
        required: false
        type: boolean
        default: false

# Prevent two prod deploys running in parallel
concurrency:
  group: cd-prod
  cancel-in-progress: false   # queue, never cancel a running prod deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aegispay
  # Prod images are tagged prod-<sha> — never dev-<sha>
  IMAGE_TAG_PREFIX: prod
  HELM_VALUES_FILE: infra/helm/aegispay/values-prod.yaml
  ARGOCD_APP_FILE: infra/argocd/app-prod.yaml
  JAVA_SERVICES: >-
    api-gateway
    user-service
    transaction-service
    ledger-service
    payment-orchestrator
    risk-engine
    notification-service
    ai-platform
    data-pipeline
    reconciliation-service

jobs:
  # ── Guard: resolve SHA, validate trigger ────────────────────────────────────
  guard:
    name: Guard — resolve SHA
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      deploy_sha: ${{ steps.resolve-sha.outputs.sha }}
      image_tag:  ${{ steps.resolve-sha.outputs.image_tag }}
    steps:
      - name: Resolve deploy SHA
        id: resolve-sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.release_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "sha=${SHA}"                             >> "$GITHUB_OUTPUT"
          # Prod images are always tagged with the prod- prefix
          echo "image_tag=${IMAGE_TAG_PREFIX}-${SHA}"  >> "$GITHUB_OUTPUT"
        env:
          IMAGE_TAG_PREFIX: ${{ env.IMAGE_TAG_PREFIX }}

  # ── Validate all prod images exist in GHCR ──────────────────────────────────
  validate-images:
    name: Validate prod images in GHCR
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check all prod images exist
        env:
          IMAGE_TAG: ${{ needs.guard.outputs.image_tag }}
        run: |
          FAILED=0
          for svc in ${{ env.JAVA_SERVICES }}; do
            IMAGE="${{ env.IMAGE_PREFIX }}/${svc}:${IMAGE_TAG}"
            echo "Checking ${IMAGE} ..."
            if ! docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "::error::Image NOT found: ${IMAGE}"
              echo "::error::Prod CI (ci-java-prod.yml) must build prod-<sha> images before deploying."
              FAILED=1
            else
              echo "✅ ${IMAGE}"
            fi
          done
          # Check web image too
          WEB_IMAGE="${{ env.IMAGE_PREFIX }}/web:${IMAGE_TAG}"
          if ! docker manifest inspect "${WEB_IMAGE}" > /dev/null 2>&1; then
            echo "::error::Web image NOT found: ${WEB_IMAGE}"
            FAILED=1
          else
            echo "✅ ${WEB_IMAGE}"
          fi

          if [ "$FAILED" = "1" ]; then
            echo "::error::One or more prod images missing. Aborting deployment."
            exit 1
          fi

  # ── Update values-prod.yaml with prod-<sha> image tags ─────────────────────
  deploy:
    name: Update values-prod.yaml → push to main
    needs: [guard, validate-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: production
      url: https://argocd.aegispay.io/applications/aegispay-prod

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GIT_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "shreyasshelar"
          git config user.email "shreyasshelarrr@gmail.com"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in values-prod.yaml
        env:
          IMAGE_TAG: ${{ needs.guard.outputs.image_tag }}
        run: |
          if [ ! -f "${{ env.HELM_VALUES_FILE }}" ]; then
            echo "::error::${{ env.HELM_VALUES_FILE }} does not exist."
            echo "::error::Create it before enabling this workflow (see COMPROMISED P3-6)."
            exit 1
          fi

          for svc in ${{ env.JAVA_SERVICES }}; do
            KEY=$(echo "$svc" | tr '-' '_')
            yq e ".services.${KEY}.image.tag = \"${IMAGE_TAG}\"" -i "${{ env.HELM_VALUES_FILE }}"
            echo "  ✓ services.${KEY}.image.tag = ${IMAGE_TAG}"
          done
          yq e ".services.web.image.tag = \"${IMAGE_TAG}\"" -i "${{ env.HELM_VALUES_FILE }}"
          echo "  ✓ services.web.image.tag = ${IMAGE_TAG}"

      - name: Show diff
        run: git diff

      - name: Commit and push [skip ci]
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        env:
          IMAGE_TAG: ${{ needs.guard.outputs.image_tag }}
        run: |
          git add "${{ env.HELM_VALUES_FILE }}"
          if git diff --staged --quiet; then
            echo "Nothing changed — already at ${IMAGE_TAG}"
            exit 0
          fi
          git commit -m "chore(cd/prod): deploy ${IMAGE_TAG} to production [skip ci]"
          git push origin main

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "::notice::Dry run complete — files updated locally but NOT pushed to main."

  # ── Force ArgoCD prod sync ──────────────────────────────────────────────────
  argocd-sync:
    name: Trigger ArgoCD prod sync
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ vars.ARGOCD_SERVER != '' }}
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Sync aegispay-prod
        env:
          ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER }}
          ARGOCD_TOKEN:  ${{ secrets.ARGOCD_TOKEN }}
        run: |
          argocd app sync aegispay-prod \
            --auth-token "$ARGOCD_TOKEN" \
            --server     "$ARGOCD_SERVER" \
            --grpc-web \
            --timeout 300
          argocd app wait aegispay-prod \
            --auth-token "$ARGOCD_TOKEN" \
            --server     "$ARGOCD_SERVER" \
            --grpc-web \
            --health \
            --timeout 300

      - name: Post-deploy smoke test
        env:
          GATEWAY_URL: ${{ secrets.PROD_GATEWAY_URL }}
        run: |
          echo "Running production smoke test..."
          curl --fail --retry 5 --retry-delay 15 --retry-max-time 120 \
            "${GATEWAY_URL}/actuator/health"
          echo "✅ Production health check passed"
