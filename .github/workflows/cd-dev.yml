name: CD — Deploy to Dev (dev branch)

# Triggers when either CI workflow completes on dev, OR when manually dispatched.
#
# Two trigger paths:
#   CI — Java (Smart) completes → cd-dev detects Java + web changes, builds both
#   CI — Web App     completes → cd-dev detects web changes, builds web only
#
# This dual-trigger ensures web-only commits (apps/web/** changes that don't
# touch any Java service or Helm chart) still get built and deployed.
# Without it, web-only PRs have no auto-deploy because ci-java.yml never runs.
#
# Smart build: only builds images for services/web that actually changed.
# If libs/ changed → rebuild ALL Java services (they all depend on shared libs).
#
# Flow: detect-changes → build only changed services → patch values-dev.yaml
#       with new SHA tags → commit → ArgoCD auto-syncs.
#
# Git identity: shreyasshelar / shreyasshelarrr@gmail.com (no bots)

on:
  workflow_run:
    workflows: ["CI — Java (Smart)", "CI — Web App"]
    types: [completed]
    branches: [dev]
  # Manual trigger: use force-all=true to rebuild every service regardless of diff.
  # NOTE: workflow_run.branches filter only applies to push-triggered parents,
  # not workflow_dispatch — so manual CI runs don't auto-chain. Use this manually.
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy (defaults to HEAD of dev)"
        required: false
        default: ""
      force-all:
        description: "Rebuild all services regardless of diff"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Cancel previous run on same branch
concurrency:
  group: cd-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aegispay
  HELM_VALUES_FILE: infra/helm/aegispay/values-dev.yaml

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    # Run when triggered by successful CI OR by manual workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      services: ${{ steps.diff.outputs.services }}
      web: ${{ steps.diff.outputs.web }}
      any-changed: ${{ steps.diff.outputs.any-changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 2   # need HEAD and HEAD~1 for diff

      - name: Compute changed services
        id: diff
        env:
          FORCE_ALL: ${{ github.event.inputs.force-all || 'false' }}
        run: |
          ALL_JAVA=(api-gateway user-service transaction-service ledger-service \
                    payment-orchestrator risk-engine notification-service \
                    ai-platform data-pipeline reconciliation-service)

          if [ "$FORCE_ALL" = "true" ]; then
            echo "force-all=true: rebuilding everything"
            JAVA_JSON=$(printf '%s\n' "${ALL_JAVA[@]}" | jq -Rc . | jq -sc .)
            echo "services=${JAVA_JSON}" >> "$GITHUB_OUTPUT"
            echo "web=true"             >> "$GITHUB_OUTPUT"
            echo "any-changed=true"     >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get the diff against the previous commit.
          # git fetch-depth: 2 ensures HEAD~1 is available.
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          if [ -z "$CHANGED" ]; then
            # No diff available (first commit, shallow clone edge case)
            # Fall back to rebuilding everything
            echo "No diff available — rebuilding all"
            JAVA_JSON=$(printf '%s\n' "${ALL_JAVA[@]}" | jq -Rc . | jq -sc .)
            echo "services=${JAVA_JSON}" >> "$GITHUB_OUTPUT"
            echo "web=true"             >> "$GITHUB_OUTPUT"
            echo "any-changed=true"     >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # ── libs/ changed → rebuild ALL Java services ──
          LIBS_CHANGED=$(echo "$CHANGED" | grep -c "^libs/" || true)
          if [ "$LIBS_CHANGED" -gt 0 ]; then
            echo "Shared libs changed — rebuilding all Java services"
            JAVA_JSON=$(printf '%s\n' "${ALL_JAVA[@]}" | jq -Rc . | jq -sc .)
            echo "services=${JAVA_JSON}" >> "$GITHUB_OUTPUT"
          else
            # Build only services with changes in their own directory
            BUILT=()
            for svc in "${ALL_JAVA[@]}"; do
              if echo "$CHANGED" | grep -q "^services/${svc}/"; then
                BUILT+=("$svc")
              fi
            done
            # Guard: empty BUILT array — printf '' | jq produces [""] not []
            # which triggers a spurious Docker job with matrix.service="" → Maven fails.
            if [ ${#BUILT[@]} -eq 0 ]; then
              JAVA_JSON='[]'
            else
              JAVA_JSON=$(printf '%s\n' "${BUILT[@]}" | jq -Rc . | jq -sc .)
            fi
            echo "services=${JAVA_JSON}" >> "$GITHUB_OUTPUT"
          fi

          # ── web changed ──
          WEB_CHANGED=$(echo "$CHANGED" | grep -cE "^(apps/web/|packages/|package\.json|turbo\.json)" || true)
          if [ "$WEB_CHANGED" -gt 0 ]; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

          # ── any changed ──
          SVC_COUNT=$(echo "$JAVA_JSON" | jq 'length')
          WEB_VAL=$(grep "^web=" "$GITHUB_OUTPUT" | cut -d= -f2)
          if [ "$SVC_COUNT" -gt 0 ] || [ "$WEB_VAL" = "true" ]; then
            echo "any-changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "any-changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "--- Summary ---"
          echo "Java services: $JAVA_JSON"
          echo "Web: $WEB_VAL"

  # ── Build & push changed Java services ─────────────────────────────────────
  build-and-push:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    # Only run if at least one Java service changed; matrix skips automatically if empty
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # Install parent POMs first so service builds can resolve deps
      - name: Install root + libs parent POMs
        run: |
          mvn --batch-mode --no-transfer-progress install -N
          mvn --batch-mode --no-transfer-progress install -N -f libs/pom.xml

      - name: Build JAR (shared libs + service)
        run: |
          mvn --batch-mode --no-transfer-progress clean package \
            -pl libs/common-domain,libs/common-security,libs/common-kafka,libs/common-observability,services/${{ matrix.service }} \
            --also-make \
            -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev-latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev-${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push Next.js web app ──────────────────────────────────────────
  build-web:
    name: Docker — web
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:dev-latest
            ${{ env.IMAGE_PREFIX }}/web:dev-${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://aegispay-api.shreyasshelar.uk
            NEXT_PUBLIC_WS_BASE_URL=wss://aegispay-ws.shreyasshelar.uk
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

  # ── Patch image tags in values-dev.yaml and commit ────────────────────────
  update-image-tags:
    name: Patch values-dev.yaml → commit
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push, build-web]
    # Run even if one of the build jobs was skipped (no changes in that area),
    # Run whenever at least one build succeeded, even if the other failed.
    # This ensures the web tag+timestamp are always committed when the web
    # image builds successfully — even when a Java service build fails.
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.any-changed == 'true' &&
      (needs.build-web.result == 'success' || needs.build-and-push.result == 'success')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GIT_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "shreyasshelar"
          git config user.email "shreyasshelarrr@gmail.com"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Patch image tags in values-dev.yaml
        env:
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          CHANGED_JAVA: ${{ needs.detect-changes.outputs.services }}
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web }}
        run: |
          # Key map: Helm values key → Docker image name
          declare -A SERVICE_MAP=(
            [api_gateway]="api-gateway"
            [user_service]="user-service"
            [transaction_service]="transaction-service"
            [ledger_service]="ledger-service"
            [payment_orchestrator]="payment-orchestrator"
            [risk_engine]="risk-engine"
            [notification_service]="notification-service"
            [ai_platform]="ai-platform"
            [data_pipeline]="data-pipeline"
            [reconciliation_service]="reconciliation-service"
          )

          TAG="dev-${SHA}"

          # Update only the Java services that were actually built
          readarray -t BUILT_JAVA < <(echo "$CHANGED_JAVA" | jq -r '.[]' 2>/dev/null || true)
          for svc_key in "${!SERVICE_MAP[@]}"; do
            svc_img="${SERVICE_MAP[$svc_key]}"
            if printf '%s\n' "${BUILT_JAVA[@]}" | grep -qx "${svc_img}"; then
              yq e ".services.${svc_key}.image.tag = \"${TAG}\"" -i "${{ env.HELM_VALUES_FILE }}"
              echo "  ✓ services.${svc_key}.image.tag = ${TAG}"
            fi
          done

          # Update web tag + deployTimestamp whenever web was built.
          # deployTimestamp is injected as a pod annotation in the Helm template,
          # so ArgoCD detects a spec diff and rolls the pod even when the image
          # tag is reused (dev-latest scenario caused by a failed CD run).
          if [ "$WEB_CHANGED" = "true" ] && [ "${{ needs.build-web.result }}" = "success" ]; then
            yq e ".services.web.image.tag = \"${TAG}\"" -i "${{ env.HELM_VALUES_FILE }}"
            yq e ".services.web.deployTimestamp = \"${SHA}\"" -i "${{ env.HELM_VALUES_FILE }}"
            echo "  ✓ services.web.image.tag = ${TAG}"
            echo "  ✓ services.web.deployTimestamp = ${SHA}"
          fi

      - name: Commit and push [skip ci]
        env:
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          git add "${{ env.HELM_VALUES_FILE }}"
          if git diff --staged --quiet; then
            echo "No tag changes — already up to date"
            exit 0
          fi
          git commit -m "chore(cd/dev): deploy dev-${SHA:0:12} [skip ci]"
          git push origin dev

      # ArgoCD watches dev branch (app-gcp.yaml targetRevision: dev) and
      # auto-syncs when values-dev.yaml changes — no manual trigger needed.
      # ApplyOutOfSyncOnly=true ensures only changed resources are reapplied.
