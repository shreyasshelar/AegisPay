# ─────────────────────────────────────────────────────────────────────────────
# AegisPay — CD: Dev / Cost-Optimised (dev)
#
# Triggered automatically after the Java CI completes successfully on
# dev.
#
# Key differences from prod CD:
#   • Builds Docker images HERE (ci-java.yml on cost-optimised does NOT push)
#   • Tags images as :dev-{sha} to separate from prod images
#   • Only rebuilds services whose source files changed (change detection re-run)
#   • Deploys to on-prem k3s cluster via ArgoCD (app-onprem.yaml)
#   • Lighter resource requests (values-dev.yaml) — suitable for k3s
#   • Uses OpenRouter AI instead of Anthropic direct API (cost saving)
# ─────────────────────────────────────────────────────────────────────────────
name: CD — Dev / Cost-Optimised (dev)

on:
  workflow_run:
    workflows: ["CI — Java (Smart)"]
    types: [completed]
    branches: [dev]

  # Manual trigger for re-deploy or debugging
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to rebuild (leave empty = all changed)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aegispay
  HELM_VALUES_FILE: infra/helm/aegispay/values-dev.yaml
  ARGOCD_APP_FILE: infra/argocd/app-onprem.yaml
  ALL_JAVA_SERVICES: >-
    api-gateway
    user-service
    transaction-service
    ledger-service
    payment-orchestrator
    risk-engine
    notification-service
    ai-platform
    data-pipeline
    reconciliation-service

jobs:
  # ── Guard: only proceed if triggering CI was successful ─────────────────────
  guard:
    name: Guard — check CI result
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      dev_tag: ${{ steps.sha.outputs.dev_tag }}
    steps:
      - name: Resolve SHA and dev image tag
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${GITHUB_SHA}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "dev_tag=dev-${SHA:0:12}" >> "$GITHUB_OUTPUT"

  # ── Detect changed services (mirrors ci-java.yml logic) ─────────────────────
  detect-changes:
    name: Detect changed services
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.build-list.outputs.services_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      # If manual trigger with explicit service list, use that
      - name: Use manual service list
        if: github.event_name == 'workflow_dispatch' && inputs.services != ''
        id: manual
        run: |
          SERVICES=$(echo "${{ inputs.services }}" | tr ',' ' ' | tr -s ' ')
          JSON=$(echo "$SERVICES" | jq -R 'split(" ")' | jq -c '.')
          echo "services_json=$JSON" >> "$GITHUB_OUTPUT"

      # Otherwise detect from git diff against HEAD~1
      - name: Detect from git diff
        if: github.event_name != 'workflow_dispatch' || inputs.services == ''
        id: diff
        run: |
          PREV="${{ github.event.workflow_run.head_sha }}^"
          CURR="${{ github.event.workflow_run.head_sha }}"

          # Check if libs changed — if so, rebuild everything
          LIBS_CHANGED=$(git diff --name-only "$PREV" "$CURR" -- libs/ 2>/dev/null | wc -l)
          CHANGED=()

          if [ "$LIBS_CHANGED" -gt 0 ]; then
            echo "Libs changed → rebuilding all services"
            for svc in ${{ env.ALL_JAVA_SERVICES }}; do
              CHANGED+=("$svc")
            done
          else
            for svc in ${{ env.ALL_JAVA_SERVICES }}; do
              DIR="services/${svc}"
              COUNT=$(git diff --name-only "$PREV" "$CURR" -- "$DIR/" 2>/dev/null | wc -l)
              if [ "$COUNT" -gt 0 ]; then
                CHANGED+=("$svc")
              fi
            done
          fi

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "No service changes detected"
            echo '[]' > /tmp/services.json
          else
            printf '%s\n' "${CHANGED[@]}" | jq -R . | jq -sc . > /tmp/services.json
          fi

          cat /tmp/services.json
          echo "services_json=$(cat /tmp/services.json)" >> "$GITHUB_OUTPUT"

      - name: Build final service list
        id: build-list
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.services }}" ]; then
            echo "services_json=${{ steps.manual.outputs.services_json }}" >> "$GITHUB_OUTPUT"
          else
            echo "services_json=${{ steps.diff.outputs.services_json }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build & Push Docker images with :dev-{sha} tag ──────────────────────────
  build-and-push:
    name: Build & push ${{ matrix.service }}
    needs: [guard, detect-changes]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.services_json != '[]'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build JAR (shared libs + service)
        run: |
          mvn clean package -DskipTests \
            -pl services/${{ matrix.service }} \
            --also-make \
            -B --no-transfer-progress

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.guard.outputs.dev_tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev-latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            JAR_FILE=target/${{ matrix.service }}-*.jar

  # ── Update values-dev.yaml with new dev image tags ──────────────────────────
  update-helm-values:
    name: Update values-dev.yaml
    needs: [guard, detect-changes, build-and-push]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.services_json != '[]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GIT_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "aegispay-ci[bot]"
          git config user.email "aegispay-ci@users.noreply.github.com"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Patch image tags for changed services
        env:
          DEV_TAG: ${{ needs.guard.outputs.dev_tag }}
          SERVICES_JSON: ${{ needs.detect-changes.outputs.services_json }}
        run: |
          echo "$SERVICES_JSON" | jq -r '.[]' | while read svc; do
            KEY=$(echo "$svc" | tr '-' '_')
            yq e ".services.${KEY}.image.tag = \"${DEV_TAG}\"" -i ${{ env.HELM_VALUES_FILE }}
            echo "Patched $svc → $DEV_TAG"
          done

      - name: Commit and push [skip ci]
        env:
          DEV_TAG: ${{ needs.guard.outputs.dev_tag }}
        run: |
          git add ${{ env.HELM_VALUES_FILE }}
          git diff --staged --quiet && echo "Nothing changed" && exit 0
          git commit -m "chore(cd/dev): deploy ${DEV_TAG} to k3s dev [skip ci]"
          git push origin dev

  # ── Trigger ArgoCD sync on on-prem k3s cluster ─────────────────────────────
  argocd-sync:
    name: Sync ArgoCD on-prem app
    needs: update-helm-values
    runs-on: ubuntu-latest
    if: ${{ vars.ARGOCD_ONPREM_SERVER != '' }}
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Sync aegispay-onprem application
        env:
          ARGOCD_SERVER: ${{ vars.ARGOCD_ONPREM_SERVER }}
          ARGOCD_TOKEN:  ${{ secrets.ARGOCD_ONPREM_TOKEN }}
        run: |
          argocd app sync aegispay-onprem \
            --auth-token "$ARGOCD_TOKEN" \
            --server "$ARGOCD_SERVER" \
            --grpc-web \
            --timeout 300
          argocd app wait aegispay-onprem \
            --auth-token "$ARGOCD_TOKEN" \
            --server "$ARGOCD_SERVER" \
            --grpc-web \
            --health \
            --timeout 300

      - name: Dev smoke test
        env:
          GATEWAY_URL: ${{ secrets.DEV_GATEWAY_URL }}
        run: |
          echo "Running dev environment smoke test..."
          curl --fail --retry 5 --retry-delay 15 --retry-max-time 90 \
            "${GATEWAY_URL}/actuator/health"
          echo "✅ Dev health check passed"

  # ── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    needs: [guard, detect-changes, build-and-push, update-helm-values]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print summary
        env:
          DEV_TAG: ${{ needs.guard.outputs.dev_tag }}
          SERVICES: ${{ needs.detect-changes.outputs.services_json }}
        run: |
          echo "## Dev Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: \`${DEV_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: \`dev\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Services rebuilt**: \`${SERVICES}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Values file updated**: \`${{ env.HELM_VALUES_FILE }}\`" >> "$GITHUB_STEP_SUMMARY"
