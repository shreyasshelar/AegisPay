name: CD — Deploy to Dev (dev branch)

# Triggers when "CI — Java (Smart)" completes successfully on the dev branch.
# Flow: Build Docker images for all Java services + web → push to GHCR →
#       patch values-dev.yaml with new SHA tags → commit → ArgoCD auto-syncs.
#
# Git identity: shreyasshelar / shreyasshelarrr@gmail.com (no bots)
# Requires: GIT_DEPLOY_TOKEN secret (PAT with repo write scope)

on:
  workflow_run:
    workflows: ["CI — Java (Smart)"]
    types: [completed]
    branches: [dev]

# Cancel previous run on same branch
concurrency:
  group: cd-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aegispay
  HELM_VALUES_FILE: infra/helm/aegispay/values-dev.yaml

jobs:
  # ── Build & push each Java service ─────────────────────────────────────────
  build-and-push:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - transaction-service
          - ledger-service
          - payment-orchestrator
          - risk-engine
          - notification-service
          - ai-platform
          - data-pipeline
          - reconciliation-service

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # Install parent POMs first so service builds can resolve deps
      - name: Install root + libs parent POMs
        run: |
          mvn --batch-mode --no-transfer-progress install -N
          mvn --batch-mode --no-transfer-progress install -N -f libs/pom.xml

      - name: Build JAR (shared libs + service)
        run: |
          mvn --batch-mode --no-transfer-progress clean package \
            -pl libs/common-domain,libs/common-events,libs/common-security,libs/common-kafka,libs/common-observability,services/${{ matrix.service }} \
            --also-make \
            -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev-latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev-${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push Next.js web app ──────────────────────────────────────────
  build-web:
    name: Docker — web
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:dev-latest
            ${{ env.IMAGE_PREFIX }}/web:dev-${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://aegispay-api.shreyasshelar.uk
            NEXT_PUBLIC_WS_BASE_URL=wss://aegispay-ws.shreyasshelar.uk
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://aegispay-api.shreyasshelar.uk
            NEXT_PUBLIC_WS_BASE_URL=wss://aegispay-ws.shreyasshelar.uk

  # ── Patch image tags in values-dev.yaml and commit ────────────────────────
  update-image-tags:
    name: Patch values-dev.yaml → commit
    runs-on: ubuntu-latest
    needs: [build-and-push, build-web]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GIT_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "shreyasshelar"
          git config user.email "shreyasshelarrr@gmail.com"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Patch image tags in values-dev.yaml
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Key map: Helm values key (underscore) → Docker image name (hyphen)
          declare -A SERVICE_MAP=(
            [api_gateway]="api-gateway"
            [user_service]="user-service"
            [transaction_service]="transaction-service"
            [ledger_service]="ledger-service"
            [payment_orchestrator]="payment-orchestrator"
            [risk_engine]="risk-engine"
            [notification_service]="notification-service"
            [ai_platform]="ai-platform"
            [data_pipeline]="data-pipeline"
            [reconciliation_service]="reconciliation-service"
            [web]="web"
          )

          for svc_key in "${!SERVICE_MAP[@]}"; do
            TAG="dev-${SHA}"
            yq e ".services.${svc_key}.image.tag = \"${TAG}\"" -i "${{ env.HELM_VALUES_FILE }}"
            echo "  ✓ services.${svc_key}.image.tag = ${TAG}"
          done

      - name: Commit and push [skip ci]
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git add "${{ env.HELM_VALUES_FILE }}"
          if git diff --staged --quiet; then
            echo "No tag changes — already up to date"
            exit 0
          fi
          git commit -m "chore(cd/dev): deploy dev-${SHA:0:12} [skip ci]"
          git push origin dev

      # ArgoCD watches dev branch (app-gcp.yaml targetRevision: dev) and
      # auto-syncs when values-dev.yaml changes — no manual trigger needed.
